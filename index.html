// ── WMO ────────────────────────────────────────────────────────
function wmoCondition(c){
  if(c===0)return"clear";if(c<=3)return"partly";if(c<=48)return"cloudy";
  if(c<=67)return"rain";if(c<=77)return"snow";if(c<=82)return"rain";return"storm";
}
function wmoDesc(c){
  if(c===0)return"Clear";if(c===1)return"Mostly Clear";if(c===2)return"Partly Cloudy";
  if(c===3)return"Overcast";if(c<=48)return"Foggy";if(c<=55)return"Drizzle";
  if(c<=67)return"Rain";if(c<=77)return"Snow";if(c<=82)return"Showers";return"Thunderstorm";
}
function wmoEmoji(c){
  if(c===0)return"☀️";if(c<=2)return"⛅";if(c===3)return"☁️";
  if(c<=48)return"🌫️";if(c<=67)return"🌧️";if(c<=77)return"❄️";
  if(c<=82)return"🌦️";return"⛈️";
}

// ── COMFORT ENGINE ─────────────────────────────────────────────
function computeComfort(temp, humidity, wind, precipChance, uvIndex, sensitivity) {
  const sens = sensitivity==="low"?0.7:sensitivity==="high"?1.3:1.0;
  // Temperature score (peak at 68°F)
  let tempScore;
  if(temp>=62&&temp<=74) tempScore=100;
  else if(temp>=55&&temp<62) tempScore=100-(62-temp)*5;
  else if(temp>74&&temp<=82) tempScore=100-(temp-74)*5;
  else if(temp<55) tempScore=Math.max(0,60-(55-temp)*4);
  else tempScore=Math.max(0,60-(temp-82)*4);
  // Humidity score
  let humScore=100;
  if(humidity>65) humScore=100-(humidity-65)*1.5;
  if(humidity>85) humScore=Math.max(0,humScore-(humidity-85)*2);
  // Wind score
  let windScore=100;
  if(wind>12) windScore=100-(wind-12)*4;
  windScore=Math.max(0,windScore);
  // Rain score
  let rainScore=100;
  if(precipChance>20) rainScore=100-(precipChance-20)*0.8;
  rainScore=Math.max(0,rainScore);
  // UV score
  let uvScore=100;
  if(uvIndex>5) uvScore=100-(uvIndex-5)*8;
  uvScore=Math.max(0,uvScore);
  const raw=(tempScore*0.4+humScore*0.2+windScore*0.2+rainScore*0.15+uvScore*0.05);
  const adjusted=Math.round(Math.min(100,Math.max(0,raw+(100-raw)*(1-sens)*0.2)));
  const cat=adjusted>=80?"excellent":adjusted>=60?"good":adjusted>=40?"fair":"poor";
  return{score:adjusted,category:cat};
}

// ── ATMOSPHERE ENGINE ──────────────────────────────────────────
function getAtmosphere(cond, hour, temp, wind, humidity) {
  const isNight=hour>=21||hour<6;
  const isDawn=hour>=6&&hour<9;
  const isDusk=hour>=17&&hour<21;
  const isAfternoon=hour>=12&&hour<17;
  const isMorning=hour>=9&&hour<12;
  const month=new Date().getMonth();
  const isSummer=month>=5&&month<=8;
  const isWinter=month>=11||month<=2;
  const isSpring=month>=3&&month<=5;
  const isFall=month>=9&&month<=11;

  if(cond==="storm") return isNight?"Stormy night ahead":"Stormy conditions moving in";
  if(cond==="snow") return isNight?"Quiet snowfall tonight":"Snow in the air";
  if(cond==="rain") {
    if(isNight) return"Soft rain in the dark";
    if(isDusk) return"Rainy evening setting in";
    if(wind>20) return"Wet and blustery";
    return"A gentle rainy day";
  }
  if(cond==="cloudy") {
    if(isNight) return"Overcast and still tonight";
    if(temp<45) return"Cold and grey";
    if(isFall) return"Classic autumn grey";
    return"Quiet overcast day";
  }
  // Clear / partly
  if(isDawn) {
    if(isSpring) return"Fresh spring morning";
    if(isSummer) return"Bright summer morning";
    if(isFall) return"Crisp autumn dawn";
    return"Still winter morning";
  }
  if(isMorning) {
    if(temp<50) return"Brisk and clear";
    if(temp<65) return"Beautiful morning outside";
    return"Warm, clear morning";
  }
  if(isAfternoon) {
    if(temp>=68&&temp<=78&&wind<12) return"Perfect afternoon outside";
    if(temp>85) return"Hot and sunny afternoon";
    if(isSummer&&temp>=75) return"Classic summer afternoon";
    if(isSpring) return"Lovely spring afternoon";
    return"Clear afternoon";
  }
  if(isDusk) {
    if(temp>=60&&temp<=75) return"Golden hour — ideal porch weather";
    if(isSummer) return"Warm summer evening";
    if(isFall) return"Autumn evening glow";
    return"Quiet evening light";
  }
  if(isNight) {
    if(temp>=55&&temp<=68&&humidity<60) return"Windows-open kind of night";
    if(temp<40) return"Cold clear night";
    if(isSummer) return"Warm summer night";
    return"Calm night";
  }
  return"Mostly clear skies";
}

// ── DAILY NARRATIVE ENGINE ─────────────────────────────────────
function generateNarrative(current, daily, hourly) {
  if(!current||!daily||!hourly) return "";
  const d=daily[0]||{};
  const cond=current.condition;
  const temp=current.temp;
  const high=d.high||temp, low=d.low||temp;
  const spread=high-low;
  const rainHours=hourly.filter(h=>h.precipChance>=50);
  const hasEveningRain=rainHours.some(h=>h.hour>=17&&h.hour<=22);
  const hasMorningRain=rainHours.some(h=>h.hour>=6&&h.hour<=12);
  const hasAllDayRain=rainHours.length>=8;
  const trendDown=hourly.length>=18&&(hourly[18].temp-hourly[0].temp)<-10;
  const trendUp=hourly.length>=18&&(hourly[18].temp-hourly[0].temp)>10;
  const month=new Date().getMonth();
  const isSummer=month>=5&&month<=8;
  const isFall=month>=9&&month<=11;
  const isSpring=month>=3&&month<=5;

  if(cond==="storm") return"Stormy weather today — keep plans flexible and stay sheltered.";
  if(cond==="snow") return"Snow is in the forecast. Allow extra travel time and dress in layers.";
  if(hasAllDayRain) return"A rainy day from start to finish. A good one to stay cosy inside.";
  if(hasMorningRain&&!hasEveningRain) return"Rain this morning clears up later — afternoon looks pleasant.";
  if(hasEveningRain&&!hasMorningRain) {
    if(temp>65) return"Warm and clear through most of the day, with rain arriving this evening.";
    return"Dry through the day with rain expected this evening.";
  }
  if(cond==="cloudy") {
    if(trendDown) return"Mild start, but temperatures drop through the day as clouds thicken.";
    return"Overcast and quiet. Good light for being outside without the glare.";
  }
  if(cond==="partly") {
    if(spread>=15) return"Mild morning temperatures climbing to a "+high+"° high. Comfortable all day.";
    return"A mix of sun and clouds. Comfortable and calm conditions throughout.";
  }
  // clear
  if(cond==="clear") {
    if(temp>=68&&temp<=80) return isSummer?"Classic summer day — warm, bright, and ideal for being outside.":"Warm and sunny — make the most of it.";
    if(temp>80) return"Hot and sunny today. UV will peak midday — sunscreen and shade recommended.";
    if(temp<45) return"Cold and clear. The sun is out but keep layers on.";
    if(trendUp) return"A cool morning giving way to a bright, warming afternoon.";
    if(isSpring) return"A beautiful spring day. Comfortable temperatures and clear skies.";
    if(isFall) return"Crisp autumn day with clear skies. One of the better days of the season.";
  }
  return"Conditions look comfortable throughout the day.";
}

// ── BEST TIME ENGINE ───────────────────────────────────────────
function getBestTimes(hourly, prefs) {
  if(!hourly||!hourly.length) return[];
  const sens=prefs.temperatureSensitivity||"medium";
  const results=[];

  // Find best outdoor window (comfort + daylight)
  const outdoor=hourly.filter(h=>h.hour>=7&&h.hour<=20);
  let bestComfort=0, bestWindow=null;
  for(let i=0;i<outdoor.length-1;i++){
    const h=outdoor[i];
    const c=computeComfort(h.temp,h.humidity,h.wind,h.precipChance,0,sens);
    if(c.score>bestComfort&&c.score>=65){
      bestComfort=c.score;
      bestWindow=h;
    }
  }
  if(bestWindow){
    const endH=Math.min(bestWindow.hour+3,20);
    const endLabel=(endH%12||12)+(endH<12?"a":"p");
    results.push({
      id:"outdoor",
      icon:"✨",
      label:"Best time outside",
      value:bestWindow.hourLabel+"–"+endLabel,
      detail:bestComfort>=85?"Excellent conditions":"Comfortable conditions",
    });
  }

  // Find windows-open night window
  const night=hourly.filter(h=>(h.hour>=20||h.hour<6));
  const niceNight=night.filter(h=>h.temp>=54&&h.temp<=70&&h.humidity<72&&h.precipChance<20);
  if(niceNight.length>=3){
    results.push({id:"windows",icon:"🪟",label:"Open the windows",value:"Tonight looks ideal",detail:"Cool, dry air overnight"});
  }

  // Commute windows
  const ch=prefs.commuteHours||{};
  const ms=ch.morningStart!=null?ch.morningStart:7, me=ch.morningEnd!=null?ch.morningEnd:9;
  const morningCommute=hourly.filter(h=>h.hour>=ms&&h.hour<=me);
  const morningRain=morningCommute.some(h=>h.precipChance>=50);
  if(morningRain){
    results.push({id:"commute",icon:"☂️",label:"Morning commute",value:"Rain expected",detail:"Allow extra time, bring umbrella"});
  }

  // Sleep comfort
  const sleepHours=hourly.filter(h=>h.hour>=22||h.hour<=5);
  if(sleepHours.length>=4){
    const avgSleep=sleepHours.reduce((a,h)=>a+h.temp,0)/sleepHours.length;
    if(avgSleep>=60&&avgSleep<=70) results.push({id:"sleep",icon:"😴",label:"Sleep conditions",value:"Comfortable tonight",detail:Math.round(avgSleep)+"° overnight"});
    else if(avgSleep>78) results.push({id:"sleep",icon:"🌡️",label:"Warm overnight",value:Math.round(avgSleep)+"° tonight",detail:"Consider A/C or a fan"});
  }

  return results.slice(0,3);
}

// ── PLANNING CONFIDENCE ────────────────────────────────────────
function getPlanningConfidence(hourly, precipChance) {
  if(!hourly) return{label:"Checking conditions…",color:"rgba(255,255,255,0.4)",dot:"#888"};
  const maxPrecip=Math.max(...hourly.slice(0,12).map(h=>h.precipChance));
  const volatility=hourly.slice(0,8).reduce((acc,h,i,arr)=>{
    if(i===0)return acc;
    return acc+Math.abs(h.precipChance-(arr[i-1].precipChance));
  },0);
  if(maxPrecip<15&&volatility<30) return{label:"Outdoor plans look safe today",color:"#4ade80",dot:"#4ade80"};
  if(maxPrecip<35||volatility<50) return{label:"Mostly good — light chance of rain",color:"#a3e635",dot:"#a3e635"};
  if(maxPrecip<60) return{label:"Backup indoor option recommended",color:"#fbbf24",dot:"#fbbf24"};
  return{label:"Conditions may change quickly",color:"#f87171",dot:"#f87171"};
}

// ── ENVIRONMENTAL MEMORY ───────────────────────────────────────
function updateEnvMemory(current) {
  if(!current) return;
  const mem=store.get("envMemory")||{};
  const today=new Date().toDateString();
  if(current.temp<=32&&mem.lastFreezeDate!==today){
    if(!mem.lastFreezeDate||Date.now()-new Date(mem.lastFreezeDate).getTime()>30*86400000)
      mem.firstFreezeAlert=true;
    mem.lastFreezeDate=today;
  }
  if(current.temp>=90) mem.lastHeatDate=today;
  if(current.precipChance<10){
    mem.drySinceDays=(mem.drySinceDays||0)+1;
  } else { mem.drySinceDays=0; }
  store.set("envMemory",mem);
  return mem;
}

// ── GRADIENT SYSTEM ────────────────────────────────────────────
function getBg(cond, h, temp) {
  const t=temp||65, night=h>=21||h<6, dawn=h>=6&&h<9, dusk=h>=17&&h<21;
  if(night){
    if(t<28)return"linear-gradient(160deg,#040608 0%,#090d15 100%)";
    if(t<45)return"linear-gradient(160deg,#060c1a 0%,#0b1425 100%)";
    if(t<68)return"linear-gradient(160deg,#0f172a 0%,#1e1b4b 60%,#0c0a09 100%)";
    return"linear-gradient(160deg,#130f24 0%,#1e1040 60%,#120808 100%)";
  }
  if(cond==="storm")return"linear-gradient(160deg,#14082a 0%,#0f0a20 50%,#080810 100%)";
  if(cond==="snow")return"linear-gradient(160deg,#c7dff0 0%,#deeef9 60%,#eef6fd 100%)";
  if(cond==="rain"){
    if(t<45)return"linear-gradient(160deg,#0a1520 0%,#131f2a 50%,#0d1a22 100%)";
    if(t<65)return"linear-gradient(160deg,#1a2a3f 0%,#1e2d4a 50%,#1a2535 100%)";
    return"linear-gradient(160deg,#1e3a5f 0%,#1e2d5a 50%,#263238 100%)";
  }
  if(cond==="cloudy"){
    if(t<28)return"linear-gradient(160deg,#141820 0%,#1c2230 100%)";
    if(t<45)return"linear-gradient(160deg,#1a2230 0%,#252f3e 100%)";
    if(t<58)return"linear-gradient(160deg,#222e40 0%,#2e3c50 100%)";
    if(t<68)return"linear-gradient(160deg,#2d3d52 0%,#3c4f66 100%)";
    if(t<78)return"linear-gradient(160deg,#38434e 0%,#4a5568 100%)";
    if(t<90)return"linear-gradient(160deg,#3d3830 0%,#504840 100%)";
    return"linear-gradient(160deg,#3a2820 0%,#4a3830 100%)";
  }
  if(dawn)return"linear-gradient(160deg,#7c2d12 0%,#c2410c 40%,#f59e0b 80%,#fbbf24 100%)";
  if(dusk)return"linear-gradient(160deg,#7f1d1d 0%,#b91c1c 30%,#c2410c 60%,#f97316 100%)";
  if(t<28)return"linear-gradient(160deg,#0c1829 0%,#162035 50%,#0a1220 100%)";
  if(t<45)return"linear-gradient(160deg,#0f2540 0%,#1a3555 50%,#0d1e33 100%)";
  if(t<58)return"linear-gradient(160deg,#0e3054 0%,#1a4a7a 50%,#0d2845 100%)";
  if(t<68)return"linear-gradient(160deg,#0284c7 0%,#0ea5e9 40%,#7dd3fc 100%)";
  if(t<78)return"linear-gradient(160deg,#0369a1 0%,#0284c7 40%,#f59e0b 100%)";
  if(t<90)return"linear-gradient(160deg,#92400e 0%,#d97706 40%,#fbbf24 100%)";
  return"linear-gradient(160deg,#881337 0%,#be123c 30%,#dc2626 60%,#f97316 100%)";
}

// ── GEOCODING & WEATHER ────────────────────────────────────────
const USER_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
async function geocode(q){
  const r=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=6&language=en&format=json");
  const d=await r.json();
  return(d.results||[]).map(x=>({id:x.latitude.toFixed(2)+"_"+x.longitude.toFixed(2),name:x.name,region:[x.admin1,x.country_code].filter(Boolean).join(", "),lat:x.latitude,lon:x.longitude}));
}
async function reverseGeocode(lat,lon){
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lon+"&format=json",{headers:{"Accept-Language":"en"}});
    const d=await r.json();
    const name=d.address.city||d.address.town||d.address.village||d.address.county||"My Location";
    const region=(d.address.state_code||d.address.country_code||"").toUpperCase();
    return{name,region};
  }catch{return{name:"My Location",region:""};}
}
async function fetchWeather(lat,lon){
  const tz=encodeURIComponent(USER_TZ);
  const url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
    "&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode,windspeed_10m,relativehumidity_2m,uv_index,visibility"+
    "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,windspeed_10m_max,uv_index_max"+
    "&current_weather=true&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone="+tz+"&forecast_days=7";
  const r=await fetch(url);
  if(!r.ok) throw new Error("Weather API "+r.status);
  return transformWeather(await r.json());
}
function transformWeather(raw){
  const cw=raw.current_weather,h=raw.hourly,d=raw.daily;
  const cwH=cw.time?cw.time.slice(0,13):"";
  let ci=cwH?h.time.findIndex(t=>t.slice(0,13)===cwH):0;
  if(ci<0)ci=0;
  const current={
    temp:Math.round(cw.temperature),
    feelsLike:Math.round(h.apparent_temperature[ci]!=null?h.apparent_temperature[ci]:cw.temperature),
    condition:wmoCondition(cw.weathercode),description:wmoDesc(cw.weathercode),wmoCode:cw.weathercode,
    humidity:h.relativehumidity_2m[ci]||0,wind:Math.round(cw.windspeed),
    visibility:Math.round((h.visibility[ci]||10000)/1609.34),uvIndex:Math.round(h.uv_index[ci]||0),
    high:Math.round(d.temperature_2m_max[0]),low:Math.round(d.temperature_2m_min[0]),
    precipChance:h.precipitation_probability[ci]||0,
  };
  const hourlyOut=[];
  for(let i=0;i<24;i++){
    const idx=ci+i;if(idx>=h.time.length)break;
    const hr=parseInt(h.time[idx].slice(11,13),10);
    hourlyOut.push({hour:hr,hourLabel:(hr%12||12)+(hr<12?"a":"p"),
      temp:Math.round(h.temperature_2m[idx]),condition:wmoCondition(h.weathercode[idx]),wmoCode:h.weathercode[idx],
      precipChance:h.precipitation_probability[idx]||0,wind:Math.round(h.windspeed_10m[idx]),
      humidity:h.relativehumidity_2m[idx]||0,uvIndex:Math.round(h.uv_index[idx]||0),
    });
  }
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dailyOut=d.time.map((t,i)=>({
    day:i===0?"Today":DAYS[new Date(t+"T12:00:00").getDay()],
    high:Math.round(d.temperature_2m_max[i]),low:Math.round(d.temperature_2m_min[i]),
    condition:wmoCondition(d.weathercode[i]),wmoCode:d.weathercode[i],
    precip:d.precipitation_probability_max[i]||0,wind:Math.round(d.windspeed_10m_max[i]),
    uvMax:Math.round((d.uv_index_max||[])[i]||0),
  }));
  return{current,hourly:hourlyOut,daily:dailyOut,fetchedAt:Date.now()};
}

// ── GITHUB ─────────────────────────────────────────────────────
const GH_FILE="atlas-preferences.json";
async function ghRead(token,repo){
  const r=await fetch("https://api.github.com/repos/"+repo+"/contents/"+GH_FILE,{headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json"}});
  if(r.status===404)return null;
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||"GitHub "+r.status);}
  const data=await r.json();
  const content=JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,"")))));
  return{content,sha:data.sha};
}
async function ghWrite(token,repo,content,sha){
  const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2))));
  const body={message:"atlas: sync preferences",content:encoded};if(sha)body.sha=sha;
  const r=await fetch("https://api.github.com/repos/"+repo+"/contents/"+GH_FILE,{method:"PUT",headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json","Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||"GitHub "+r.status);}
  return r.json();
}

// ── ENVIRONMENTAL TIMELINE ─────────────────────────────────────
function EnvironmentalTimeline({hourly,prefs}){
  if(!hourly||!hourly.length) return null;
  const nowH=new Date().getHours();
  const sens=prefs.temperatureSensitivity||"medium";

  // Color per hour comfort
  function hourColor(h){
    const c=computeComfort(h.temp,h.humidity,h.wind,h.precipChance,h.uvIndex||0,sens);
    if(c.category==="excellent") return"rgba(74,222,128,0.35)";
    if(c.category==="good") return"rgba(163,230,53,0.25)";
    if(c.category==="fair") return"rgba(251,191,36,0.2)";
    return"rgba(248,113,113,0.2)";
  }
  function hourDot(h){
    if(h.precipChance>=60) return{show:true,color:"#93c5fd",emoji:"🌧️"};
    if(h.precipChance>=30) return{show:true,color:"#bfdbfe",emoji:"🌦️"};
    if(h.wmoCode===0&&h.hour>=6&&h.hour<20) return{show:false,color:"",emoji:"☀️"};
    return{show:false,color:"",emoji:""};
  }
  function timeLabel(h){
    const hr=h.hour;
    if(hr===0) return"12a";
    if(hr===12) return"12p";
    if(hr<12) return hr+"a";
    return(hr-12)+"p";
  }
  function isSpecial(h){
    // rough sunrise/sunset (simplified)
    if(h.hour===6) return{type:"sunrise",icon:"🌅"};
    if(h.hour===20) return{type:"sunset",icon:"🌇"};
    return null;
  }

  return(
    <div style={{marginBottom:16}}>
      <SectionLabel>Today's Rhythm</SectionLabel>
      <div style={{overflowX:"auto",paddingBottom:4}}>
        <div style={{display:"flex",gap:0,width:"max-content",padding:"0 4px"}}>
          {hourly.slice(0,18).map((h,i)=>{
            const special=isSpecial(h);
            const dot=hourDot(h);
            const isCurrent=i===0;
            const comfort=computeComfort(h.temp,h.humidity,h.wind,h.precipChance,h.uvIndex||0,sens);
            const isGood=comfort.category==="excellent"||comfort.category==="good";
            return(
              <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:48,padding:"10px 4px 8px",background:isCurrent?"rgba(255,255,255,0.1)":hourColor(h),borderRadius:isCurrent?12:0,borderLeft:i===0?"none":i===1&&!isCurrent?"1px solid rgba(255,255,255,0.04)":"none",position:"relative"}}>
                {/* Top indicator — rain / special */}
                <div style={{height:16,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {special?<span style={{fontSize:11}}>{special.icon}</span>:dot.show?<div style={{width:6,height:6,borderRadius:"50%",background:dot.color}}/>:<div style={{width:6,height:6}}/>}
                </div>
                {/* Temp */}
                <div style={{fontFamily:"'Fraunces',serif",fontSize:16,fontWeight:300,color:isCurrent?"#fff":isGood?"rgba(255,255,255,0.85)":"rgba(255,255,255,0.5)",lineHeight:1}}>{h.temp}°</div>
                {/* Comfort bar */}
                <div style={{width:20,height:2,background:"rgba(255,255,255,0.1)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:(comfort.score)+"%",background:isGood?"#4ade80":"#fbbf24",borderRadius:2}}/>
                </div>
                {/* Time */}
                <div style={{fontFamily:"'DM Sans'",fontSize:10,color:isCurrent?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.3)",letterSpacing:"0.02em"}}>{isCurrent?"Now":timeLabel(h)}</div>
                {/* Rain % if notable */}
                {h.precipChance>=30&&<div style={{fontFamily:"'DM Sans'",fontSize:9,color:"#93c5fd"}}>{h.precipChance}%</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── SMART ALERTS ───────────────────────────────────────────────
function generateAlerts(signals, prefs, hourly, envMemory){
  const out=[];
  const rain=signals.find(s=>s.type==="rain_window");
  if(rain&&hourly){
    const ch=prefs.commuteHours||{};
    const ms=ch.morningStart!=null?ch.morningStart:7, me=ch.morningEnd!=null?ch.morningEnd:9;
    const es=ch.eveningStart!=null?ch.eveningStart:17, ee=ch.eveningEnd!=null?ch.eveningEnd:19;
    const rh=hourly.slice(rain.startIdx,rain.endIdx+1);
    if(rh.some(h=>h.hour>=ms&&h.hour<=me)) out.push({id:"morning_rain",severity:"warning",title:"Rain during your morning commute",message:"Rain from "+rain.start+"–"+rain.end+". Umbrella recommended."});
    else if(rh.some(h=>h.hour>=es&&h.hour<=ee)) out.push({id:"evening_rain",severity:"warning",title:"Rain on your way home",message:"Rain expected "+rain.start+"–"+rain.end+". Plan accordingly."});
  }
  const trend=signals.find(s=>s.type==="temp_trend");
  if(trend&&trend.direction==="falling"&&trend.delta>=15) out.push({id:"rapid_drop",severity:"info",title:"Temperature drops "+trend.delta+"° tonight",message:"Sharp fall expected this evening. A layer will help."});
  if(envMemory&&envMemory.firstFreezeAlert) out.push({id:"first_freeze",severity:"warning",title:"First freeze of the season",message:"Consider turning off outdoor water lines and protecting plants."});
  return out;
}

// ── CONTEXTUAL INSIGHT LIST ────────────────────────────────────
function processSignals(hourly){
  const sigs=[];if(!hourly||!hourly.length)return sigs;
  let rs=null,re=null;
  for(let i=0;i<hourly.length;i++){if(hourly[i].precipChance>=50){if(rs===null)rs=i;re=i;}}
  if(rs!==null){
    let mx=0;hourly.slice(rs,re+1).forEach(h=>{if(h.precipChance>mx)mx=h.precipChance;});
    sigs.push({type:"rain_window",startIdx:rs,endIdx:re,start:hourly[rs].hourLabel,end:hourly[re].hourLabel,intensity:mx>80?"heavy":mx>60?"moderate":"light"});
  }
  let early=0,late=0;
  hourly.slice(0,6).forEach(h=>early+=h.temp);early/=6;
  hourly.slice(18,24).forEach(h=>late+=h.temp);late/=6;
  const delta=Math.round(late-early);
  if(Math.abs(delta)>=8) sigs.push({type:"temp_trend",direction:delta<0?"falling":"rising",delta:Math.abs(delta)});
  return sigs;
}

function InsightList({current,hourly,sigs,prefs}){
  const out=[];
  if(!current||!hourly) return null;
  const sens=prefs.temperatureSensitivity||"medium";

  // LEVEL 1: Meaning-first interpretations
  const rain=sigs.find(s=>s.type==="rain_window");
  if(rain){
    const pi=rain.startIdx+Math.floor((rain.endIdx-rain.startIdx)/2);
    out.push({id:"rain",icon:"🌧️",level:1,title:rain.intensity.charAt(0).toUpperCase()+rain.intensity.slice(1)+" rain arriving "+rain.start,description:"Give yourself a few extra minutes to plan around it."});
  }
  // Check wind for outdoor dining
  if(current.wind>=18) out.push({id:"wind_dine",icon:"🍽️",level:1,title:"Wind may disrupt outdoor dining",description:current.wind+" mph winds tonight — rooftop or open-air spots could feel uncomfortable."});
  // Check pets if preference set
  if(prefs.hasPets&&current.temp>88) out.push({id:"pets",icon:"🐾",level:1,title:"Hot for pets outside",description:"Avoid extended outdoor time with pets — pavement and heat can be tough on them."});
  // Garden alert
  if(prefs.hasGarden&&rain) out.push({id:"garden",icon:"🌿",level:1,title:"Good day to skip watering",description:"Rain is coming — your garden will take care of itself today."});

  // LEVEL 2: Events
  const trend=sigs.find(s=>s.type==="temp_trend");
  if(trend) out.push({id:"trend",icon:trend.direction==="falling"?"🌡️":"🌤️",level:2,title:"Temperatures "+trend.direction+" "+trend.delta+"° later",description:trend.direction==="falling"?"A notable drop is expected tonight. A layer will keep you comfortable.":"It warms up significantly through the afternoon."});

  if(current.uvIndex>=7) out.push({id:"uv",icon:"☀️",level:2,title:"High UV today — peak around midday",description:"SPF 30+ if you're spending time outside between 10am and 3pm."});

  return out.length?(
    <div style={{marginBottom:16}}>
      <SectionLabel>What it means for you</SectionLabel>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {out.slice(0,4).map(ins=>(

            <div>
              <div style={{fontFamily:"'DM Sans'",fontWeight:600,fontSize:14,color:"#f1f5f9",marginBottom:3}}>{ins.title}</div>
              <div style={{fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,0.5)",lineHeight:1.6}}>{ins.description}</div>
            </div>
          </Card>
        ))}
      </div>
    </div>
  ):null;
}

// ── COMMUTE CARD ───────────────────────────────────────────────
function CommuteCard({hourly,prefs}){
  const ch=prefs.commuteHours||{};
  const ms=ch.morningStart!=null?ch.morningStart:7, me=ch.morningEnd!=null?ch.morningEnd:9;
  const es=ch.eveningStart!=null?ch.eveningStart:17, ee=ch.eveningEnd!=null?ch.eveningEnd:19;
  function getWindow(s,e){
    if(!hourly||!hourly.length) return null;
    const win=hourly.filter(h=>h.hour>=s&&h.hour<=e);
    if(!win.length) return null;
    const avgTemp=Math.round(win.reduce((a,h)=>a+h.temp,0)/win.length);
    let mx=0,wc=0;win.forEach(h=>{if(h.precipChance>mx)mx=h.precipChance;if(h.wmoCode>wc)wc=h.wmoCode;});
    return{avgTemp,maxPrecip:mx,wmoCode:wc};
  }
  const fmt=i=>(i%12||12)+(i<12?"a":"p");
  const morning=getWindow(ms,me), evening=getWindow(es,ee);
  if(!morning&&!evening) return null;
  return(
    <div style={{marginBottom:16}}>
      <SectionLabel>Commute</SectionLabel>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {[{label:"Morning",time:fmt(ms)+"–"+fmt(me),data:morning},{label:"Evening",time:fmt(es)+"–"+fmt(ee),data:evening}].map(({label,time,data})=>(
          <Card key={label} style={{padding:"14px 14px"}}>
            <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:10}}>
              <Icon name="Clock" size={11} style={{color:"rgba(255,255,255,0.35)"}}/>
              <div style={{fontFamily:"'DM Sans'",fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.35)",letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</div>
            </div>
            {data?(
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <span style={{fontSize:24}}>{wmoEmoji(data.wmoCode)}</span>
                  <span style={{fontFamily:"'Fraunces',serif",fontSize:30,fontWeight:300,color:"#f1f5f9",letterSpacing:"-1px"}}>{data.avgTemp}°</span>
                </div>
                <div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.35)"}}>{time}</div>
                {data.maxPrecip>=20&&<div style={{fontFamily:"'DM Sans'",fontSize:11,color:"#93c5fd",marginTop:4}}>☂️ {data.maxPrecip}% rain</div>}
              </div>
            ):<div style={{fontFamily:"'DM Sans'",fontSize:13,color:"rgba(255,255,255,0.25)"}}>—</div>}
          </Card>
        ))}
      </div>
    </div>
  );
}

                  <div key={loc.id} onClick={()=>toggle(loc.id)} style={{display:"flex",alignItems:"center",gap:12,background:checked?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.04)",border:checked?"1px solid rgba(255,255,255,0.18)":"1px solid rgba(255,255,255,0.07)",borderRadius:12,padding:"11px 14px",cursor:"pointer"}}>
                    <div style={{width:20,height:20,borderRadius:6,background:checked?"#38bdf8":"rgba(255,255,255,0.07)",border:checked?"none":"1px solid rgba(255,255,255,0.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {checked&&<Icon name="Check" size={12} style={{color:"#0f172a"}}/>}
                    </div>
                    <div>
                      <div style={{fontFamily:"'DM Sans'",fontSize:14,color:"#f1f5f9",fontWeight:checked?600:400}}>{loc.name}</div>
                      {loc.region&&<div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.35)"}}>{loc.region}</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:10}}>
          {!isNew&&<button onClick={()=>onDelete(group.id)} style={{padding:"13px 0",width:44,background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.2)",borderRadius:12,color:"#f87171",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="Trash2" size={15}/></button>}
          <button onClick={save} style={{flex:1,padding:"13px 0",background:name.trim()?"rgba(56,189,248,0.18)":"rgba(255,255,255,0.05)",border:name.trim()?"1px solid rgba(56,189,248,0.3)":"1px solid rgba(255,255,255,0.08)",borderRadius:12,color:name.trim()?"#38bdf8":"rgba(255,255,255,0.25)",fontFamily:"'DM Sans'",fontWeight:600,fontSize:14,cursor:name.trim()?"pointer":"default"}}>
            {isNew?"Create Group":"Save Changes"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── SETTINGS DRAWER ────────────────────────────────────────────
function SettingsDrawer({prefs,onSavePrefs,onClose,onSyncPull,onSyncPush,syncStatus}){
  const [lp,setLp]=useState(Object.assign({},prefs));
  const [ghToken,setGhToken]=useState(store.get("ghToken")||"");
  const [ghRepo,setGhRepo]=useState(store.get("ghRepo")||"");

  const search=v=>{setQ(v);clearTimeout(timer.current);if(!v.trim()){setRes([]);return;}timer.current=setTimeout(async()=>{setLoading(true);try{setRes(await geocode(v));}catch{setRes([]);}finally{setLoading(false);}},400);};
  const addLoc=l=>{const u=locs.find(x=>x.id===l.id)?locs:locs.concat([l]);setLocs(u);store.set("locations",u);setQ("");setRes([]);};
  const removeLoc=id=>{const u=locs.filter(l=>l.id!==id);if(!u.length)return;setLocs(u);store.set("locations",u);};
  const moveLoc=(i,d)=>{const n=locs.slice();const t=i+d;if(t<0||t>=n.length)return;[n[i],n[t]]=[n[t],n[i]];setLocs(n);store.set("locations",n);};
  const setCH=(k,v)=>setLp(p=>Object.assign({},p,{commuteHours:Object.assign({},p.commuteHours,{[k]:+v})}));
  const saveGh=()=>{store.set("ghToken",ghToken.trim());store.set("ghRepo",ghRepo.trim());};
  const save=()=>{saveGh();onSavePrefs(Object.assign({},lp,{locations:locs}));onClose();};
  const ch=lp.commuteHours||{};

          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"rgba(255,255,255,0.7)"}}><Icon name="X" size={14}/></button>
        </div>

        {/* Cities */}
        <div style={{marginBottom:24}}>
          <FieldLabel>Saved Cities</FieldLabel>
          <div style={{position:"relative",marginBottom:8}}>
            <Icon name="Search" size={13} style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.3)"}}/>
            <input value={q} onChange={e=>search(e.target.value)} placeholder="Search cities…" style={{width:"100%",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"9px 12px 9px 32px",color:"#f1f5f9",fontFamily:"'DM Sans'",fontSize:13,outline:"none"}}/>
          </div>

              {loading&&<div style={{padding:"10px 14px",fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,0.35)"}}>Searching…</div>}
              {res.map(r=>(
                <div key={r.id} onClick={()=>addLoc(r)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <div><div style={{fontFamily:"'DM Sans'",fontSize:13,color:"#f1f5f9"}}>{r.name}</div><div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.35)"}}>{r.region}</div></div>
                  <Icon name="Plus" size={14} style={{color:"rgba(255,255,255,0.35)"}}/>

          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {locs.map((l,i)=>(

                    {l.isCurrentLocation&&<Icon name="Crosshair" size={11} style={{color:"#38bdf8",flexShrink:0}}/>}{l.name}
                  </div>
                  {l.region&&<div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.35)"}}>{l.region}</div>}
                </div>

                  {i<locs.length-1&&!l.isCurrentLocation&&<button onClick={()=>moveLoc(i,1)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.3)",padding:"2px 4px"}}><Icon name="ArrowDown" size={12}/></button>}
                  {locs.length>1&&!l.isCurrentLocation&&<button onClick={()=>removeLoc(l.id)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.25)",padding:"2px 4px"}}><Icon name="Trash2" size={13}/></button>}
                </div>
              </div>

        </div>

        {/* Commute */}
        <div style={{marginBottom:20}}>
          <FieldLabel>Commute Windows</FieldLabel>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            {[{label:"Morning",sk:"morningStart",ek:"morningEnd",ds:7,de:9},{label:"Evening",sk:"eveningStart",ek:"eveningEnd",ds:17,de:19}].map(({label,sk,ek,ds,de})=>(

                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Lifestyle */}
        <div style={{marginBottom:20}}>
          <FieldLabel>Lifestyle</FieldLabel>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[
              {key:"prefersOpenWindows",label:"🪟 Open windows"},
              {key:"hasGarden",label:"🌿 Garden"},
              {key:"hasPets",label:"🐾 Pets"},
            ].map(({key,label})=>{
              const on=!!lp[key];
              return(
                <button key={key} onClick={()=>setLp(p=>Object.assign({},p,{[key]:!p[key]}))} style={{padding:"6px 14px",borderRadius:20,border:"none",background:on?"rgba(56,189,248,0.18)":"rgba(255,255,255,0.06)",color:on?"#38bdf8":"rgba(255,255,255,0.4)",fontFamily:"'DM Sans'",fontSize:12,cursor:"pointer",border:on?"1px solid rgba(56,189,248,0.3)":"1px solid rgba(255,255,255,0.08)"}}>

        {/* Temp sensitivity */}
        <div style={{marginBottom:24}}>
          <FieldLabel>Temperature Sensitivity</FieldLabel>
          <div style={{display:"flex",gap:8}}>
            {["low","medium","high"].map(s=>{
              const active=lp.temperatureSensitivity===s;
              return <button key={s} onClick={()=>setLp(p=>Object.assign({},p,{temperatureSensitivity:s}))} style={{flex:1,padding:"8px 0",background:active?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.06)",border:active?"1px solid rgba(255,255,255,0.22)":"1px solid rgba(255,255,255,0.07)",borderRadius:10,color:active?"#f1f5f9":"rgba(255,255,255,0.4)",fontFamily:"'DM Sans'",fontSize:13,cursor:"pointer",textTransform:"capitalize"}}>{s}</button>;
            })}
          </div>
        </div>

        {/* GitHub Sync */}
        <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:16,marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <Icon name="Github" size={15} style={{color:"rgba(255,255,255,0.4)"}}/>
            <span style={{fontFamily:"'DM Sans'",fontWeight:600,fontSize:13,color:"rgba(255,255,255,0.6)"}}>GitHub Sync</span>
          </div>
          <div style={{marginBottom:10}}><FieldLabel>Personal Access Token</FieldLabel><TInput type="password" value={ghToken} onChange={e=>setGhToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"/><div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.25)",marginTop:4}}>Needs <code>contents:write</code> scope</div></div>
          <div style={{marginBottom:14}}><FieldLabel>Repository (owner/repo)</FieldLabel><TInput value={ghRepo} onChange={e=>setGhRepo(e.target.value)} placeholder="your-username/my-weather-prefs"/></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{saveGh();onSyncPull(ghToken.trim(),ghRepo.trim());}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px 0",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"rgba(255,255,255,0.6)",fontFamily:"'DM Sans'",fontSize:13,cursor:"pointer"}}>
              <Icon name="ArrowDownToLine" size={13}/> Pull
            </button>
            <button onClick={()=>{saveGh();onSyncPush(ghToken.trim(),ghRepo.trim());}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px 0",background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:10,color:"rgba(255,255,255,0.6)",fontFamily:"'DM Sans'",fontSize:13,cursor:"pointer"}}>
              <Icon name="ArrowUpFromLine" size={13}/> Push

          {syncStatus&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:10}}>{statusIcon}<span style={{fontFamily:"'DM Sans'",fontSize:12,color:syncStatus==="success"?"#4ade80":syncStatus==="error"?"#f87171":"rgba(255,255,255,0.4)"}}>{syncStatus==="loading"?"Syncing…":syncStatus==="success"?"Synced":syncStatus==="error"?"Sync failed":""}</span></div>}
        </div>

        <button onClick={save} style={{width:"100%",padding:"13px 0",background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:12,color:"#f1f5f9",fontFamily:"'DM Sans'",fontWeight:600,fontSize:14,cursor:"pointer"}}>
          Save &amp; Close
        </button>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  const [locations,setLocations]       = useState(store.get("locations")||DEFAULT_LOCATIONS);
  const [activeLocId,setActiveLocId]   = useState(store.get("locId")||DEFAULT_LOCATIONS[0].id);
  const [wxCache,setWxCache]           = useState({});
  const [loadingLoc,setLoadingLoc]     = useState({});
  const [errorLoc,setErrorLoc]         = useState({});
  const [prefs,setPrefs]               = useState(store.get("prefs")||DEFAULT_PREFS);
  const [dismissed,setDismissed]       = useState(store.get("dismissed")||[]);
  const [tab,setTab]                   = useState("today");
  const [showSettings,setShowSettings] = useState(false);
  const [syncStatus,setSyncStatus]     = useState(null);
  const [ghSha,setGhSha]               = useState(store.get("ghSha")||null);
  const [groups,setGroups]             = useState(store.get("groups")||[]);
  const [editingGroup,setEditingGroup] = useState(null);
  const [locLoading,setLocLoading]     = useState(false);
  const [envMemory,setEnvMemory]       = useState(store.get("envMemory")||{});

  const STALE=30*60*1000;
  const activeLoc=locations.find(l=>l.id===activeLocId)||locations[0];
  const wx=wxCache[activeLocId];
  const isLoading=!!loadingLoc[activeLocId];
  const error=errorLoc[activeLocId];
  const signals=processSignals(wx?wx.hourly:null);
  const allAlerts=generateAlerts(signals,prefs,wx?wx.hourly:null,envMemory);
  const alerts=allAlerts.filter(a=>dismissed.indexOf(a.id)<0);
  const nowH=new Date().getHours();
  const bg=getBg(wx&&wx.current?wx.current.condition:"clear",nowH,wx&&wx.current?wx.current.temp:null);

  const loadWeather=useCallback(async loc=>{
    const cached=wxCache[loc.id];
    if(cached&&Date.now()-cached.fetchedAt<STALE)return;
    setLoadingLoc(p=>Object.assign({},p,{[loc.id]:true}));
    setErrorLoc(p=>Object.assign({},p,{[loc.id]:null}));
    try{
      const data=await fetchWeather(loc.lat,loc.lon);
      setWxCache(p=>Object.assign({},p,{[loc.id]:data}));
      const mem=updateEnvMemory(data.current);
      if(mem){setEnvMemory(mem);}
    }catch(e){
      setErrorLoc(p=>Object.assign({},p,{[loc.id]:e.message||"Failed to fetch weather"}));
    }finally{
      setLoadingLoc(p=>Object.assign({},p,{[loc.id]:false}));
    }
  },[wxCache]);

  // Geolocation on mount
  useEffect(()=>{
    if(navigator.geolocation){
      setLocLoading(true);
      navigator.geolocation.getCurrentPosition(
        async pos=>{
          const lat=pos.coords.latitude,lon=pos.coords.longitude;
          const {name,region}=await reverseGeocode(lat,lon);
          const myLoc={id:"my_location",name,region,lat:parseFloat(lat.toFixed(4)),lon:parseFloat(lon.toFixed(4)),isCurrentLocation:true};
          setLocations(prev=>[myLoc,...prev.filter(l=>!l.isCurrentLocation)]);
          if(!store.get("locId")) setActiveLocId("my_location");
          setLocLoading(false);
          loadWeather(myLoc);
        },
        ()=>setLocLoading(false),
        {timeout:8000}
      );
    }
  },[]);

  useEffect(()=>{if(activeLoc)loadWeather(activeLoc);},[activeLocId]);
  useEffect(()=>{if(tab==="groups")groups.forEach(g=>g.locationIds.forEach(id=>{const l=locations.find(x=>x.id===id);if(l)loadWeather(l);}));},[tab]);
  useEffect(()=>{store.set("locId",activeLocId);},[activeLocId]);
  useEffect(()=>{store.set("prefs",prefs);},[prefs]);
  useEffect(()=>{store.set("dismissed",dismissed);},[dismissed]);
  useEffect(()=>{store.set("locations",locations);},[locations]);
  useEffect(()=>{store.set("groups",groups);},[groups]);
  useEffect(()=>{if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});},[]);

  const handleSavePrefs=data=>{const nl=data.locations;const rest=Object.assign({},data);delete rest.locations;setPrefs(rest);if(nl){setLocations(nl);if(!nl.find(l=>l.id===activeLocId))setActiveLocId(nl[0].id);nl.forEach(l=>loadWeather(l));}};
  const handleGhPull=async(token,repo)=>{if(!token||!repo){setSyncStatus("error");return;}setSyncStatus("loading");try{const r=await ghRead(token,repo);if(!r){setSyncStatus("error");return;}if(r.content.locations){setLocations(r.content.locations);store.set("locations",r.content.locations);}if(r.content.prefs)setPrefs(r.content.prefs);if(r.content.groups){setGroups(r.content.groups);store.set("groups",r.content.groups);}setGhSha(r.sha);store.set("ghSha",r.sha);setSyncStatus("success");}catch{setSyncStatus("error");}setTimeout(()=>setSyncStatus(null),3000);};
  const handleGhPush=async(token,repo)=>{if(!token||!repo){setSyncStatus("error");return;}setSyncStatus("loading");try{const payload={version:PREFS_VERSION,locations,prefs,groups,pushedAt:new Date().toISOString()};const r=await ghWrite(token,repo,payload,ghSha||undefined);const ns=(r&&r.content)?r.content.sha:ghSha;if(ns){setGhSha(ns);store.set("ghSha",ns);}setSyncStatus("success");}catch{setSyncStatus("error");}setTimeout(()=>setSyncStatus(null),3000);};
  const handleSaveGroup=g=>{setGroups(p=>{const e=p.find(x=>x.id===g.id);return e?p.map(x=>x.id===g.id?g:x):[...p,g];});g.locationIds.forEach(id=>{const l=locations.find(x=>x.id===id);if(l)loadWeather(l);});setEditingGroup(null);};
  const handleDeleteGroup=id=>{setGroups(p=>p.filter(g=>g.id!==id));setEditingGroup(null);};
  const handleSelectGroupCity=loc=>{setLocations(p=>p.find(l=>l.id===loc.id)?p:[...p,loc]);setActiveLocId(loc.id);setTab("today");};
  const moveGroup=(id,dir)=>setGroups(p=>{const idx=p.findIndex(g=>g.id===id);const n=p.slice();const t=idx+dir;if(t<0||t>=n.length)return p;[n[idx],n[t]]=[n[t],n[idx]];return n;});
  const refreshLoc=()=>{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(async pos=>{const lat=pos.coords.latitude,lon=pos.coords.longitude;const {name,region}=await reverseGeocode(lat,lon);const myLoc={id:"my_location",name,region,lat:parseFloat(lat.toFixed(4)),lon:parseFloat(lon.toFixed(4)),isCurrentLocation:true};setLocations(p=>[myLoc,...p.filter(l=>!l.isCurrentLocation)]);setWxCache(p=>{const n=Object.assign({},p);delete n["my_location"];return n;});setActiveLocId("my_location");loadWeather(myLoc);},()=>{},{timeout:8000});};
  const dismissAlert=id=>setDismissed(p=>[...p,id]);
  const lastUpdated=wx?"Updated "+Math.round((Date.now()-wx.fetchedAt)/60000)+"m ago":"";
  const NAV=[{id:"today",label:"Today",icon:"Sun"},{id:"forecast",label:"Forecast",icon:"Calendar"},{id:"groups",label:"Groups",icon:"Layers"}];

  return(
    <div style={{minHeight:"100vh",background:bg,transition:"background 2s ease",fontFamily:"'DM Sans',sans-serif",overflowX:"hidden"}}>
      <style>{FONT_STYLE}</style>

      {/* ── HEADER ───────────────────────────────────────────── */}
      <div className="safe-top">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 18px 12px",maxWidth:480,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <AtlasIcon size={36}/>
            <span style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:400,color:"rgba(255,255,255,0.92)",letterSpacing:"0.06em"}}>ATLAS</span>
          </div>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            <IconBtn onClick={refreshLoc} style={{color:locLoading?"#38bdf8":"rgba(255,255,255,0.5)"}} title="Use my location">
              <Icon name="Crosshair" size={14}/>
            </IconBtn>
            {wx&&tab!=="groups"&&(
              <IconBtn onClick={()=>{const n=Object.assign({},wxCache);delete n[activeLocId];setWxCache(n);loadWeather(activeLoc);}}>
                <Icon name="RefreshCw" size={13}/>
              </IconBtn>
            )}
            {alerts.length>0&&(
              <div style={{width:34,height:34,borderRadius:10,background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <Icon name="Bell" size={14} style={{color:"#fbbf24"}}/>
              </div>
            )}
            <IconBtn onClick={()=>setShowSettings(true)} style={{color:"rgba(255,255,255,0.65)"}}>
              <Icon name="Settings" size={14}/>
            </IconBtn>
          </div>
        </div>
      </div>

      {/* ── LOCATION PILLS ───────────────────────────────────── */}
      {tab!=="groups"&&(
        <div style={{display:"flex",gap:7,padding:"0 18px 0",maxWidth:480,margin:"0 auto",overflowX:"auto"}}>
          {locations.map(l=>(
            <Pill key={l.id} active={activeLocId===l.id} onClick={()=>setActiveLocId(l.id)}>
              {l.isCurrentLocation?"📍 ":""}{l.name}
            </Pill>
          ))}
        </div>
      )}

      {/* ── GROUPS HEADER ────────────────────────────────────── */}
      {tab==="groups"&&(
        <div style={{padding:"16px 20px 0",maxWidth:480,margin:"0 auto"}}>
          <div style={{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:300,color:"rgba(255,255,255,0.85)",letterSpacing:"-1px",marginBottom:4}}>My Groups</div>
          <div style={{fontFamily:"'DM Sans'",fontSize:13,color:"rgba(255,255,255,0.35)",marginBottom:16}}>Trips, home bases &amp; collections</div>
        </div>
      )}

      {/* ── TODAY HERO ───────────────────────────────────────── */}
      {tab!=="groups"&&(
        <div style={{maxWidth:480,margin:"0 auto"}}>
          {isLoading&&<LoadingState/>}
          {error&&!isLoading&&<ErrorState message={error} onRetry={()=>{setErrorLoc(p=>Object.assign({},p,{[activeLocId]:null}));loadWeather(activeLoc);}}/>}
          {wx&&!isLoading&&(
            <div>
              <WeatherHero wx={wx.current} loc={activeLoc} prefs={prefs}/>
              <AtmosphereTag cond={wx.current.condition} hour={nowH} temp={wx.current.temp} wind={wx.current.wind} humidity={wx.current.humidity}/>
              <DailyNarrative current={wx.current} daily={wx.daily} hourly={wx.hourly}/>
              {lastUpdated&&<div style={{textAlign:"center",fontFamily:"'DM Sans'",fontSize:10,color:"rgba(255,255,255,0.18)",marginTop:2,letterSpacing:"0.05em"}}>{lastUpdated}</div>}
            </div>
          )}
        </div>
      )}

      {/* ── NAV TABS ─────────────────────────────────────────── */}
      <div style={{display:"flex",justifyContent:"center",padding:"12px 20px",maxWidth:480,margin:"0 auto"}}>
        <div style={{display:"flex",background:"rgba(255,255,255,0.07)",backdropFilter:"blur(16px)",borderRadius:14,padding:3,border:"1px solid rgba(255,255,255,0.08)",gap:2}}>
          {NAV.map(({id,label,icon})=>(
            <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 15px",borderRadius:11,border:"none",background:tab===id?"rgba(255,255,255,0.13)":"transparent",color:tab===id?"#fff":"rgba(255,255,255,0.45)",fontFamily:"'DM Sans'",fontSize:12,fontWeight:tab===id?600:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all 0.2s"}}>
              <Icon name={icon} size={12}/>{label}
            </button>
          ))}
        </div>
      </div>

      {/* ── CONTENT ──────────────────────────────────────────── */}
      <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 80px"}}>
        {tab!=="groups"&&<AlertBanner alerts={alerts} onDismiss={dismissAlert}/>}

        {tab==="today"&&wx&&!isLoading&&(
          <div style={{animation:"fadeIn 0.4s ease"}}>
            {/* Level 1: Planning Confidence */}
            <PlanningConfidenceCard hourly={wx.hourly} precipChance={wx.current.precipChance}/>
            {/* Environmental Timeline */}
            <EnvironmentalTimeline hourly={wx.hourly} prefs={prefs}/>
            {/* Level 1: Best Times */}
            <BestTimeCards hourly={wx.hourly} prefs={prefs}/>
            {/* Commute */}
            <CommuteCard hourly={wx.hourly} prefs={prefs}/>
            {/* Level 1+2: Insights */}
            <InsightList current={wx.current} hourly={wx.hourly} sigs={signals} prefs={prefs}/>
            {/* Level 3: Raw data — collapsed */}
            <RawDetails wx={wx.current}/>
          </div>
        )}

        {tab==="forecast"&&wx&&!isLoading&&<DailyForecast daily={wx.daily}/>}
        {tab==="groups"&&(
          <GroupsView groups={groups} locations={locations} wxCache={wxCache} loadingLoc={loadingLoc}
            onSelectCity={handleSelectGroupCity} onEditGroup={g=>setEditingGroup(g)}
            onNewGroup={()=>setEditingGroup({})} onMoveGroup={moveGroup}/>
        )}
      </div>

      {/* ── MODALS ───────────────────────────────────────────── */}
      {showSettings&&(
        <SettingsDrawer prefs={prefs} onSavePrefs={handleSavePrefs} onClose={()=>setShowSettings(false)}
          onSyncPull={handleGhPull} onSyncPush={handleGhPush} syncStatus={syncStatus}/>
      )}
      {editingGroup!==null&&(
        <GroupEditModal group={editingGroup} locations={locations} onSave={handleSaveGroup}
          onDelete={handleDeleteGroup} onClose={()=>setEditingGroup(null)}/>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
