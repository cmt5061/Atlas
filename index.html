<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f172a" />
  <title>Atlas Weather</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <style>
    html,body,#root{margin:0;padding:0;height:100%;background:#0f172a;}
    *{box-sizing:border-box;}
    body{-webkit-tap-highlight-color:transparent;}
  </style>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;
    const {
      MapPin, Wind, Droplets, Eye, ChevronDown, ChevronUp, X, Bell,
      Settings, Calendar, Sun, Umbrella, AlertTriangle,
      Search, Plus, RefreshCw, Check, Trash2, Github, CloudOff,
      Loader, ArrowDownToLine, ArrowUpFromLine
    } = lucide;

    const FONT_STYLE = `
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap');
      *{box-sizing:border-box;margin:0;padding:0;}
      body{font-family:'DM Sans',sans-serif;}
      ::-webkit-scrollbar{display:none;}
      select option{background:#0f172a;}
      input,select{outline:none;}
      @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    `;

    // ── STORAGE ───────────────────────────────────────────────────
    const NS = "atlas2_";
    const store = {
      get: (k) => { try { const v = localStorage.getItem(NS+k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(NS+k, JSON.stringify(v)); } catch {} },
    };

    // ── WMO HELPERS ───────────────────────────────────────────────
    const wmoCondition = (code) => {
      if (code === 0)  return "clear";
      if (code <= 3)   return "partly";
      if (code <= 48)  return "cloudy";
      if (code <= 67)  return "rain";
      if (code <= 77)  return "snow";
      if (code <= 82)  return "rain";
      return "storm";
    };
    const wmoDesc = (code) => {
      if (code === 0)  return "Clear";
      if (code === 1)  return "Mostly Clear";
      if (code === 2)  return "Partly Cloudy";
      if (code === 3)  return "Overcast";
      if (code <= 48)  return "Foggy";
      if (code <= 55)  return "Drizzle";
      if (code <= 67)  return "Rain";
      if (code <= 77)  return "Snow";
      if (code <= 82)  return "Showers";
      return "Thunderstorm";
    };
    const wmoEmoji = (code) => {
      if (code === 0)  return "☀️";
      if (code <= 2)   return "⛅";
      if (code === 3)  return "☁️";
      if (code <= 48)  return "🌫️";
      if (code <= 67)  return "🌧️";
      if (code <= 77)  return "❄️";
      if (code <= 82)  return "🌦️";
      return "⛈️";
    };

    // ── GEOCODING ─────────────────────────────────────────────────
    async function geocode(query) {
      const res = await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=6&language=en&format=json`
      );
      const data = await res.json();
      return (data.results || []).map(r => ({
        id: `${r.latitude.toFixed(2)}_${r.longitude.toFixed(2)}`,
        name: r.name,
        region: [r.admin1, r.country_code].filter(Boolean).join(", "),
        lat: r.latitude,
        lon: r.longitude,
      }));
    }

    // ── WEATHER SERVICE ───────────────────────────────────────────
    async function fetchWeather(lat, lon) {
      const url = [
        "https://api.open-meteo.com/v1/forecast",
        `?latitude=${lat}&longitude=${lon}`,
        "&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode,windspeed_10m,relativehumidity_2m,uv_index,visibility",
        "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,windspeed_10m_max,uv_index_max",
        "&current_weather=true",
        "&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch",
        "&timezone=auto&forecast_days=7",
      ].join("");
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Weather API ${res.status}`);
      return transformWeather(await res.json());
    }

    function transformWeather(raw) {
      const { current_weather, hourly, daily } = raw;
      const nowStr = new Date().toISOString().slice(0, 13);
      let curIdx = hourly.time.findIndex(t => t.startsWith(nowStr));
      if (curIdx < 0) curIdx = 0;

      const current = {
        temp:         Math.round(current_weather.temperature),
        feelsLike:    Math.round(hourly.apparent_temperature[curIdx] ?? current_weather.temperature),
        condition:    wmoCondition(current_weather.weathercode),
        description:  wmoDesc(current_weather.weathercode),
        wmoCode:      current_weather.weathercode,
        humidity:     hourly.relativehumidity_2m[curIdx] ?? 0,
        wind:         Math.round(current_weather.windspeed),
        visibility:   Math.round((hourly.visibility[curIdx] ?? 10000) / 1609.34),
        uvIndex:      Math.round(hourly.uv_index[curIdx] ?? 0),
        high:         Math.round(daily.temperature_2m_max[0]),
        low:          Math.round(daily.temperature_2m_min[0]),
        precipChance: hourly.precipitation_probability[curIdx] ?? 0,
      };

      const hourlyOut = [];
      for (let i = 0; i < 24; i++) {
        const idx = curIdx + i;
        if (idx >= hourly.time.length) break;
        const h = new Date(hourly.time[idx]).getHours();
        hourlyOut.push({
          hour:         h,
          hourLabel:    `${h % 12 || 12}${h < 12 ? "a" : "p"}`,
          temp:         Math.round(hourly.temperature_2m[idx]),
          condition:    wmoCondition(hourly.weathercode[idx]),
          wmoCode:      hourly.weathercode[idx],
          precipChance: hourly.precipitation_probability[idx] ?? 0,
          wind:         Math.round(hourly.windspeed_10m[idx]),
          humidity:     hourly.relativehumidity_2m[idx] ?? 0,
        });
      }

      const DAY_NAMES = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const dailyOut = daily.time.map((t, i) => ({
        day:       i === 0 ? "Today" : DAY_NAMES[new Date(t + "T12:00:00").getDay()],
        high:      Math.round(daily.temperature_2m_max[i]),
        low:       Math.round(daily.temperature_2m_min[i]),
        condition: wmoCondition(daily.weathercode[i]),
        wmoCode:   daily.weathercode[i],
        precip:    daily.precipitation_probability_max[i] ?? 0,
        wind:      Math.round(daily.windspeed_10m_max[i]),
        uvMax:     Math.round(daily.uv_index_max?.[i] ?? 0),
      }));

      return { current, hourly: hourlyOut, daily: dailyOut, fetchedAt: Date.now() };
    }

    // ── GITHUB SERVICE ────────────────────────────────────────────
    const GH_FILE = "atlas-preferences.json";

    async function ghRead(token, repo) {
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/${GH_FILE}`, {
        headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json" },
      });
      if (res.status === 404) return null;
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `GitHub ${res.status}`); }
      const data = await res.json();
      const content = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, "")))));
      return { content, sha: data.sha };
    }

    async function ghWrite(token, repo, content, sha) {
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2))));
      const body = { message: "atlas: sync preferences", content: encoded, ...(sha ? { sha } : {}) };
      const res = await fetch(`https://api.github.com/repos/${repo}/contents/${GH_FILE}`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}`, Accept: "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.message || `GitHub ${res.status}`); }
      return res.json();
    }

    // ── SIGNAL PROCESSOR ──────────────────────────────────────────
    function processSignals(hourly) {
      const sigs = [];
      if (!hourly?.length) return sigs;
      let rs = null, re = null;
      for (let i = 0; i < hourly.length; i++) {
        if (hourly[i].precipChance >= 50) { if (rs === null) rs = i; re = i; }
      }
      if (rs !== null) {
        const mx = Math.max(...hourly.slice(rs, re + 1).map(h => h.precipChance));
        sigs.push({ type:"rain_window", startIdx:rs, endIdx:re,
          start:hourly[rs].hourLabel, end:hourly[re].hourLabel,
          intensity: mx > 80 ? "heavy" : mx > 60 ? "moderate" : "light" });
      }
      const early = hourly.slice(0,6).reduce((a,h) => a+h.temp, 0) / 6;
      const late  = hourly.slice(18,24).reduce((a,h) => a+h.temp, 0) / 6;
      const delta = Math.round(late - early);
      if (Math.abs(delta) >= 8)
        sigs.push({ type:"temp_trend", direction: delta < 0 ? "falling" : "rising", delta: Math.abs(delta) });
      const comfort = hourly.filter(h => h.temp >= 60 && h.temp <= 78 && h.wind < 15 && h.precipChance < 30);
      if (comfort.length >= 2)
        sigs.push({ type:"comfort_window", hours: comfort.map(h => h.hourLabel) });
      return sigs;
    }

    // ── INSIGHT ENGINE ────────────────────────────────────────────
    function generateInsights(wx, hourly, sigs) {
      const out = [];
      if (!wx || !hourly?.length) return out;
      const rain = sigs.find(s => s.type === "rain_window");
      if (rain) {
        const peakIdx = rain.startIdx + Math.floor((rain.endIdx - rain.startIdx) / 2);
        out.push({ id:"rain", icon:"🌧️", priority:10,
          title: `${rain.intensity.charAt(0).toUpperCase()+rain.intensity.slice(1)} rain ${rain.start}–${rain.end}`,
          description: `Carry an umbrella. Rain peaks around ${hourly[peakIdx]?.hourLabel || rain.start}.` });
      }
      const trend = sigs.find(s => s.type === "temp_trend");
      if (trend) out.push({ id:"trend", icon: trend.direction==="falling"?"📉":"📈", priority:8,
        title: `Temps ${trend.direction} ${trend.delta}° tonight`,
        description: trend.direction==="falling" ? "Sharp drop expected — bring a layer." : "Warmer evening ahead. Dress light." });
      const comfort = sigs.find(s => s.type === "comfort_window");
      if (comfort && comfort.hours.length >= 2) out.push({ id:"comfort", icon:"✨", priority:7,
        title: `Best outside: ${comfort.hours[0]}–${comfort.hours[comfort.hours.length-1]}`,
        description: "Comfortable temps, light wind, dry skies — ideal for a walk or outdoor lunch." });
      if (wx.uvIndex >= 6) out.push({ id:"uv", icon:"☀️", priority:5,
        title: `UV index ${wx.uvIndex} — apply sunscreen`,
        description: "UV peaks midday. SPF 30+ recommended for extended time outside." });
      if (wx.humidity >= 80) out.push({ id:"humid", icon:"💧", priority:4,
        title: "High humidity today",
        description: `At ${wx.humidity}% it'll feel muggy. Stay hydrated.` });
      if (wx.wind >= 25) out.push({ id:"wind", icon:"💨", priority:6,
        title: `Gusty — ${wx.wind} mph winds`,
        description: "Strong winds may affect outdoor plans. Secure anything loose." });
      return out.sort((a,b) => b.priority-a.priority).slice(0,4);
    }

    // ── ALERT ENGINE ──────────────────────────────────────────────
    function generateAlerts(sigs, prefs) {
      const out = [];
      const rain = sigs.find(s => s.type === "rain_window");
      const commuteEnd = prefs?.commuteHours?.end ?? 17;
      if (rain && rain.startIdx <= commuteEnd)
        out.push({ id:"commute_rain", severity:"warning",
          title:"Rain during your commute",
          message:`Rain starts around ${rain.start}. Leave early or bring an umbrella.` });
      const trend = sigs.find(s => s.type === "temp_trend");
      if (trend && trend.direction==="falling" && trend.delta >= 14)
        out.push({ id:"rapid_drop", severity:"info",
          title:`Temperature drops ${trend.delta}° tonight`,
          message:"Sharp fall expected this evening. Layer up before heading out." });
      return out;
    }

    // ── ACTIVITY SCORER ───────────────────────────────────────────
    const ACTIVITIES = {
      run:    { label:"Running",        icon:"🏃", idealTemp:[50,68], maxWind:20, maxPrecip:20 },
      walk:   { label:"Walking",        icon:"🚶", idealTemp:[55,80], maxWind:25, maxPrecip:30 },
      bike:   { label:"Cycling",        icon:"🚴", idealTemp:[55,80], maxWind:15, maxPrecip:10 },
      dine:   { label:"Outdoor dining", icon:"🍽️", idealTemp:[60,82], maxWind:18, maxPrecip:10 },
      golf:   { label:"Golf",           icon:"⛳", idealTemp:[58,82], maxWind:20, maxPrecip:15 },
      travel: { label:"Travel",         icon:"✈️", idealTemp:[40,95], maxWind:30, maxPrecip:80 },
    };
    function scoreActivity(key, wx) {
      if (!wx) return { rating:"—", color:"rgba(255,255,255,0.3)" };
      const cfg = ACTIVITIES[key];
      const precip = wx.condition==="rain" ? 70 : wx.precipChance ?? 0;
      let s = 100;
      if (wx.temp < cfg.idealTemp[0]) s -= (cfg.idealTemp[0]-wx.temp)*3;
      if (wx.temp > cfg.idealTemp[1]) s -= (wx.temp-cfg.idealTemp[1])*3;
      if (wx.wind > cfg.maxWind)      s -= (wx.wind-cfg.maxWind)*4;
      if (precip > cfg.maxPrecip)     s -= (precip-cfg.maxPrecip)*1.5;
      const pct = Math.max(0, Math.min(100, s));
      return { score:pct, rating: pct>=70?"Good":pct>=40?"Okay":"Poor",
        color: pct>=70?"#4ade80":pct>=40?"#fbbf24":"#f87171" };
    }

    // ── VISUAL HELPERS ────────────────────────────────────────────
    function getBg(cond, h) {
      if (h>=20||h<6)    return "linear-gradient(160deg,#0f172a 0%,#1e1b4b 60%,#0c0a09 100%)";
      if (cond==="rain"||cond==="storm") return "linear-gradient(160deg,#1e3a5f 0%,#1e2d5a 50%,#263238 100%)";
      if (cond==="cloudy") return "linear-gradient(160deg,#334155 0%,#475569 50%,#3f4f5e 100%)";
      if (cond==="snow")   return "linear-gradient(160deg,#7dd3fc 0%,#bae6fd 60%,#e0f2fe 100%)";
      if (h>=6&&h<9)     return "linear-gradient(160deg,#c2410c 0%,#ea580c 40%,#f59e0b 100%)";
      if (h>=17&&h<20)   return "linear-gradient(160deg,#9a3412 0%,#c2410c 40%,#f97316 100%)";
      if (cond==="partly") return "linear-gradient(160deg,#0369a1 0%,#0ea5e9 50%,#38bdf8 100%)";
      return "linear-gradient(160deg,#0284c7 0%,#0ea5e9 40%,#7dd3fc 100%)";
    }
    const NOW_HOUR = new Date().getHours();

    // ── ATOMS ─────────────────────────────────────────────────────
    function Card({ children, style={} }) {
      return <div style={{ background:"rgba(255,255,255,0.07)", backdropFilter:"blur(16px)", borderRadius:20, border:"1px solid rgba(255,255,255,0.12)", ...style }}>{children}</div>;
    }
    function SectionLabel({ children }) {
      return <div style={{ fontFamily:"'DM Sans'", fontSize:11, fontWeight:600, color:"rgba(255,255,255,0.35)", letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:10, paddingLeft:2 }}>{children}</div>;
    }
    function Pill({ children, active, onClick }) {
      return <button onClick={onClick} style={{ flexShrink:0, padding:"5px 14px", borderRadius:20, border:"none", background:active?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.07)", color:active?"#fff":"rgba(255,255,255,0.5)", fontFamily:"'DM Sans'", fontSize:12, fontWeight:active?600:400, cursor:"pointer", transition:"all 0.2s", backdropFilter:"blur(8px)" }}>{children}</button>;
    }
    function FieldLabel({ children }) {
      return <div style={{ fontFamily:"'DM Sans'", fontSize:11, color:"rgba(255,255,255,0.4)", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.08em" }}>{children}</div>;
    }
    function TextInput({ value, onChange, placeholder, type="text" }) {
      return <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{ width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, padding:"9px 12px", color:"#f1f5f9", fontFamily:"'DM Sans'", fontSize:13 }} />;
    }

    // ── TEMP CURVE SVG ────────────────────────────────────────────
    function TempCurve({ data }) {
      if (!data?.length) return null;
      const temps = data.map(d => d.temp);
      const mn=Math.min(...temps), mx=Math.max(...temps), r=mx-mn||1;
      const W=700, H=50;
      const pts = temps.map((t,i) => ({ x:(i/(temps.length-1))*W, y:H-10-((t-mn)/r)*(H-20) }));
      const d = pts.map((p,i) => {
        if (i===0) return `M ${p.x} ${p.y}`;
        const pv=pts[i-1], cx=(pv.x+p.x)/2;
        return `C ${cx} ${pv.y} ${cx} ${p.y} ${p.x} ${p.y}`;
      }).join(" ");
      return (
        <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ width:"100%", height:36, display:"block" }}>
          <defs>
            <linearGradient id="tcg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stopColor="rgba(255,255,255,0.15)" />
              <stop offset="50%" stopColor="rgba(255,255,255,0.7)" />
              <stop offset="100%" stopColor="rgba(255,255,255,0.15)" />
            </linearGradient>
          </defs>
          <path d={d} fill="none" stroke="url(#tcg)" strokeWidth="2.5" strokeLinecap="round" />
        </svg>
      );
    }

    // ── LOADING / ERROR ───────────────────────────────────────────
    function LoadingState() {
      return (
        <div style={{ padding:"60px 0", textAlign:"center" }}>
          <div style={{ fontSize:36, marginBottom:12, opacity:0.6, animation:"spin 1.5s linear infinite" }}>⟳</div>
          <div style={{ fontFamily:"'DM Sans'", fontSize:14, color:"rgba(255,255,255,0.4)" }}>Fetching weather…</div>
        </div>
      );
    }
    function ErrorState({ message, onRetry }) {
      return (
        <div style={{ padding:"48px 24px", textAlign:"center" }}>
          <CloudOff size={32} style={{ color:"rgba(255,255,255,0.3)", marginBottom:12 }} />
          <div style={{ fontFamily:"'DM Sans'", fontSize:14, color:"rgba(255,255,255,0.5)", marginBottom:16, lineHeight:1.6 }}>{message}</div>
          <button onClick={onRetry} style={{ padding:"8px 20px", background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:10, color:"rgba(255,255,255,0.7)", fontFamily:"'DM Sans'", fontSize:13, cursor:"pointer" }}>Try again</button>
        </div>
      );
    }

    // ── WEATHER HERO ──────────────────────────────────────────────
    function WeatherHero({ wx, loc }) {
      if (!wx) return null;
      return (
        <div style={{ padding:"20px 20px 0", textAlign:"center" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:6, marginBottom:6 }}>
            <MapPin size={12} style={{ color:"rgba(255,255,255,0.5)" }} />
            <span style={{ fontFamily:"'DM Sans'", fontSize:12, color:"rgba(255,255,255,0.6)", letterSpacing:"0.1em", textTransform:"uppercase" }}>{loc.name}{loc.region?`, ${loc.region}`:""}</span>
          </div>
          <div style={{ fontFamily:"'Fraunces',serif", fontSize:96, fontWeight:300, color:"#fff", lineHeight:1, letterSpacing:"-4px", textShadow:"0 4px 48px rgba(0,0,0,0.3)" }}>{wx.temp}°</div>
          <div style={{ fontFamily:"'DM Sans'", fontSize:17, color:"rgba(255,255,255,0.85)", marginTop:4 }}>{wmoEmoji(wx.wmoCode)} {wx.description}</div>
          <div style={{ fontFamily:"'DM Sans'", fontSize:13, color:"rgba(255,255,255,0.5)", marginTop:5 }}>H:{wx.high}° · L:{wx.low}° · Feels {wx.feelsLike}°</div>
          <div style={{ display:"flex", justifyContent:"center", gap:22, marginTop:18, paddingBottom:4 }}>
            {[
              { icon:<Droplets size={13}/>, val:`${wx.humidity}%`,   label:"Humidity" },
              { icon:<Wind size={13}/>,     val:`${wx.wind}mph`,      label:"Wind"     },
              { icon:<Eye size={13}/>,      val:`${wx.visibility}mi`, label:"Vis"      },
              { icon:<Sun size={13}/>,      val:wx.uvIndex,           label:"UV"       },
            ].map(({ icon, val, label }) => (
              <div key={label} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                <div style={{ color:"rgba(255,255,255,0.4)" }}>{icon}</div>
                <div style={{ fontFamily:"'DM Sans'", fontWeight:600, fontSize:13, color:"rgba(255,255,255,0.9)" }}>{val}</div>
                <div style={{ fontFamily:"'DM Sans'", fontSize:10, color:"rgba(255,255,255,0.35)", letterSpacing:"0.06em", textTransform:"uppercase" }}>{label}</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ── HOURLY SCROLLER ───────────────────────────────────────────
    function HourlyScroller({ hourly }) {
      if (!hourly?.length) return null;
      return (
        <Card style={{ padding:"14px 0 10px", marginBottom:12 }}>
          <TempCurve data={hourly.slice(0,12)} />
          <div style={{ overflowX:"auto" }}>
            <div style={{ display:"flex", padding:"4px 16px", width:"max-content" }}>
              {hourly.slice(0,12).map((h,i) => (
                <div key={i} style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:5, padding:"2px 12px", borderRight:i<11?"1px solid rgba(255,255,255,0.06)":"none" }}>
                  <div style={{ fontFamily:"'DM Sans'", fontSize:11, color:"rgba(255,255,255,0.4)" }}>{i===0?"Now":h.hourLabel}</div>
                  <div style={{ fontSize:15 }}>{wmoEmoji(h.wmoCode)}</div>
                  <div style={{ fontFamily:"'DM Sans'", fontWeight:600, fontSize:14, color:"#f1f5f9" }}>{h.temp}°</div>
                  {h.precipChance>0 && <div style={{ fontFamily:"'DM Sans'", fontSize:10, color:"#93c5fd" }}>{h.precipChance}%</div>}
                </div>
              ))}
            </div>
          </div>
        </Card>
      );
    }

    // ── DAILY FORECAST ────────────────────────────────────────────
    function DailyForecast({ daily }) {
      const [expanded, setExpanded] = useState(null);
      if (!daily?.length) return null;

        <>
          <SectionLabel>7-Day Forecast</SectionLabel>
          <Card style={{ padding:"4px 0", marginBottom:12 }}>
            {daily.map((d,i) => (
              <div key={i}>
                <div onClick={() => setExpanded(expanded===i?null:i)} style={{ display:"flex", alignItems:"center", padding:"12px 16px", cursor:"pointer" }}>

                  <div style={{ fontSize:17, width:28 }}>{wmoEmoji(d.wmoCode)}</div>
                  <div style={{ flex:1, padding:"0 10px" }}>
                    <div style={{ height:4, background:"rgba(255,255,255,0.1)", borderRadius:9, overflow:"hidden" }}>
                      <div style={{ height:"100%", background:"linear-gradient(90deg,#38bdf8,#fbbf24)", borderRadius:9, width:`${Math.min(100,((d.high-d.low)/40)*100)}%` }} />
                    </div>

                  <div style={{ fontFamily:"'DM Sans'", fontSize:13, color:"rgba(255,255,255,0.4)", marginRight:10 }}>{d.low}°</div>
                  <div style={{ fontFamily:"'DM Sans'", fontWeight:600, fontSize:14, color:"#f1f5f9", marginRight:6 }}>{d.high}°</div>
                  {expanded===i ? <ChevronUp size={13} style={{ color:"rgba(255,255,255,0.3)" }}/> : <ChevronDown size={13} style={{ color:"rgba(255,255,255,0.3)" }}/>}
                </div>
                {expanded===i && (
                  <div style={{ padding:"0 16px 12px", display:"flex", gap:16 }}>
                    {[
                      { l:"Rain",   v:`${d.precip}%`, icon:<Umbrella size={12}/> },
                      { l:"Wind",   v:`${d.wind}mph`, icon:<Wind size={12}/> },
                      { l:"UV Max", v:d.uvMax,         icon:<Sun size={12}/> },
                    ].map(({ l, v, icon }) => (

                        <span style={{ color:"rgba(255,255,255,0.35)" }}>{icon}</span>
                        <span style={{ fontFamily:"'DM Sans'", fontSize:12, color:"rgba(255,255,255,0.45)" }}>{l}: </span>

                      </div>

                  </div>

              </div>
            ))}
          </Card>
        </>
      );

    // ── DEFAULTS ──────────────────────────────────────────────────
    const DEFAULT_LOCATIONS = [
      { id:"37.77_-122.41", name:"San Francisco", region:"CA, US", lat:37.77, lon:-122.41 },
      { id:"40.71_-74.01",  name:"New York",      region:"NY, US", lat:40.71, lon:-74.01  },

    // ── SETTINGS DRAWER ───────────────────────────────────────────
    function SettingsDrawer({ prefs, onSavePrefs, onClose, onSyncPull, onSyncPush, syncStatus }) {
      const [localPrefs, setLocalPrefs]       = useState({ ...prefs });
      const [ghToken, setGhToken]             = useState(() => store.get("ghToken") || "");
      const [ghRepo, setGhRepo]               = useState(() => store.get("ghRepo") || "");
      const [searchQuery, setSearchQuery]     = useState("");
      const [searchResults, setSearchResults] = useState([]);
      const [searchLoading, setSearchLoading] = useState(false);
      const [locations, setLocations]         = useState(() => store.get("locations") || DEFAULT_LOCATIONS);
      const searchTimer = useRef(null);

      const handleSearch = (q) => {
        setSearchQuery(q);
        clearTimeout(searchTimer.current);
        if (!q.trim()) { setSearchResults([]); return; }
        searchTimer.current = setTimeout(async () => {
          setSearchLoading(true);
          try { setSearchResults(await geocode(q)); } catch { setSearchResults([]); }
          finally { setSearchLoading(false); }
        }, 400);
      };

      const addLocation = (loc) => {
        const updated = locations.find(l => l.id===loc.id) ? locations : [...locations, loc];
        setLocations(updated); store.set("locations", updated);
        setSearchQuery(""); setSearchResults([]);
      };

      const removeLocation = (id) => {
        const updated = locations.filter(l => l.id!==id);
        if (!updated.length) return;
        setLocations(updated); store.set("locations", updated);
      };

      const saveGh = () => { store.set("ghToken", ghToken.trim()); store.set("ghRepo", ghRepo.trim()); };
      const handleSave = () => { saveGh(); onSavePrefs({ ...localPrefs, locations }); onClose(); };

      const StatusIcon = () => {
        if (syncStatus==="loading") return <Loader size={14} style={{ color:"rgba(255,255,255,0.5)", animation:"spin 1s linear infinite" }} />;
        if (syncStatus==="success") return <Check size={14} style={{ color:"#4ade80" }} />;
        if (syncStatus==="error")   return <X size={14} style={{ color:"#f87171" }} />;
        return null;
      };

      return (
        <div style={{ position:"fixed", inset:0, zIndex:100, display:"flex", alignItems:"flex-end" }}>
          <div onClick={onClose} style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.55)", backdropFilter:"blur(4px)" }} />
          <div style={{ position:"relative", width:"100%", maxWidth:480, margin:"0 auto", background:"rgba(13,20,38,0.97)", backdropFilter:"blur(24px)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:"22px 22px 0 0", padding:"24px 20px 40px", maxHeight:"85vh", overflowY:"auto" }}>

            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22 }}>
              <span style={{ fontFamily:"'Fraunces',serif", fontSize:18, color:"#f1f5f9" }}>Settings</span>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,0.08)", border:"none", borderRadius:8, width:28, height:28, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", color:"rgba(255,255,255,0.7)" }}><X size={14}/></button>
            </div>

            {/* Locations */}
            <div style={{ marginBottom:24 }}>
              <FieldLabel>Saved Locations</FieldLabel>
              <div style={{ position:"relative", marginBottom:8 }}>
                <Search size={13} style={{ position:"absolute", left:11, top:"50%", transform:"translateY(-50%)", color:"rgba(255,255,255,0.35)" }} />
                <input value={searchQuery} onChange={e => handleSearch(e.target.value)} placeholder="Search cities…" style={{ width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, padding:"9px 12px 9px 32px", color:"#f1f5f9", fontFamily:"'DM Sans'", fontSize:13, outline:"none" }} />
              </div>
              {(searchResults.length>0||searchLoading) && (
                <div style={{ background:"rgba(10,18,36,0.97)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:12, overflow:"hidden", marginBottom:8 }}>
                  {searchLoading && <div style={{ padding:"10px 14px", fontFamily:"'DM Sans'", fontSize:12, color:"rgba(255,255,255,0.4)" }}>Searching…</div>}
                  {searchResults.map(r => (
                    <div key={r.id} onClick={() => addLocation(r)} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", cursor:"pointer", borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
                      <div>
                        <div style={{ fontFamily:"'DM Sans'", fontSize:13, color:"#f1f5f9" }}>{r.name}</div>
                        <div style={{ fontFamily:"'DM Sans'", fontSize:11, color:"rgba(255,255,255,0.4)" }}>{r.region}</div>
                      </div>
                      <Plus size={14} style={{ color:"rgba(255,255,255,0.4)" }} />
                    </div>
                  ))}
                </div>
              )}
              <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                {locations.map(l => (
                  <div key={l.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(255,255,255,0.06)", borderRadius:10, padding:"9px 14px" }}>
                    <div>
                      <div style={{ fontFamily:"'DM Sans'", fontSize:13, color:"#f1f5f9" }}>{l.name}</div>
                      {l.region && <div style={{ fontFamily:"'DM Sans'", fontSize:11, color:"rgba(255,255,255,0.4)" }}>{l.region}</div>}
                    </div>
                    {locations.length>1 && (
                      <button onClick={() => removeLocation(l.id)} style={{ background:"none", border:"none", cursor:"pointer", color:"rgba(255,255,255,0.3)", padding:0 }}><Trash2 size={13}/></button>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* Commute */}
            <div style={{ marginBottom:20 }}>
              <FieldLabel>Commute End Hour (for rain alerts)</FieldLabel>
              <select value={localPrefs.commuteHours?.end??17} onChange={e => setLocalPrefs(p => ({ ...p, commuteHours:{ ...p.commuteHours, end:+e.target.value } }))} style={{ width:"100%", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, padding:"9px 12px", color:"#f1f5f9", fontFamily:"'DM Sans'", fontSize:13 }}>
                {Array.from({length:24},(_,i) => <option key={i} value={i} style={{background:"#0f172a"}}>{i===0?"12am":i<12?`${i}am`:i===12?"12pm":`${i-12}pm`}</option>)}
              </select>
            </div>

            {/* Temp sensitivity */}
            <div style={{ marginBottom:24 }}>
              <FieldLabel>Temperature Sensitivity</FieldLabel>
              <div style={{ display:"flex", gap:8 }}>
                {["low","medium","high"].map(s => (
                  <button key={s} onClick={() => setLocalPrefs(p => ({ ...p, temperatureSensitivity:s }))} style={{ flex:1, padding:"8px 0", background:localPrefs.temperatureSensitivity===s?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.07)", border:localPrefs.temperatureSensitivity===s?"1px solid rgba(255,255,255,0.25)":"1px solid rgba(255,255,255,0.08)", borderRadius:10, color:localPrefs.temperatureSensitivity===s?"#f1f5f9":"rgba(255,255,255,0.45)", fontFamily:"'DM Sans'", fontSize:13, cursor:"pointer", textTransform:"capitalize" }}>{s}</button>
                ))}
              </div>
            </div>

            {/* GitHub Sync */}
            <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", borderRadius:16, padding:16, marginBottom:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
                <Github size={15} style={{ color:"rgba(255,255,255,0.5)" }} />
                <span style={{ fontFamily:"'DM Sans'", fontWeight:600, fontSize:13, color:"rgba(255,255,255,0.7)" }}>GitHub Sync</span>
              </div>
              <div style={{ marginBottom:10 }}>
                <FieldLabel>Personal Access Token</FieldLabel>
                <TextInput type="password" value={ghToken} onChange={e => setGhToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" />
                <div style={{ fontFamily:"'DM Sans'", fontSize:11, color:"rgba(255,255,255,0.3)", marginTop:4 }}>Needs <code>contents:write</code> scope</div>
              </div>
              <div style={{ marginBottom:14 }}>
                <FieldLabel>Repository (owner/repo)</FieldLabel>
                <TextInput value={ghRepo} onChange={e => setGhRepo(e.target.value)} placeholder="your-username/my-weather-prefs" />
              </div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={() => { saveGh(); onSyncPull(ghToken.trim(), ghRepo.trim()); }} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"9px 0", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, color:"rgba(255,255,255,0.7)", fontFamily:"'DM Sans'", fontSize:13, cursor:"pointer" }}>
                  <ArrowDownToLine size={13}/> Pull
                </button>
                <button onClick={() => { saveGh(); onSyncPush(ghToken.trim(), ghRepo.trim()); }} style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"9px 0", background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:10, color:"rgba(255,255,255,0.7)", fontFamily:"'DM Sans'", fontSize:13, cursor:"pointer" }}>
                  <ArrowUpFromLine size={13}/> Push
                </button>
              </div>
              {syncStatus && (
                <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:10 }}>
                  <StatusIcon />
                  <span style={{ fontFamily:"'DM Sans'", fontSize:12, color:syncStatus==="success"?"#4ade80":syncStatus==="error"?"#f87171":"rgba(255,255,255,0.4)" }}>
                    {syncStatus==="loading"?"Syncing…":syncStatus==="success"?"Synced successfully":syncStatus==="error"?"Sync failed — check token & repo":""}
                  </span>
                </div>
              )}
            </div>

            <button onClick={handleSave} style={{ width:"100%", padding:"13px 0", background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.18)", borderRadius:12, color:"#f1f5f9", fontFamily:"'DM Sans'", fontWeight:600, fontSize:14, cursor:"pointer" }}>
              Save &amp; Close
            </button>
          </div>
        </div>
      );
    }

    // ── APP ───────────────────────────────────────────────────────
    function App() {
      const [locations, setLocations]       = useState(() => store.get("locations") || DEFAULT_LOCATIONS);
      const [activeLocId, setActiveLocId]   = useState(() => store.get("locId") || DEFAULT_LOCATIONS[0].id);
      const [wxCache, setWxCache]           = useState({});
      const [loadingLoc, setLoadingLoc]     = useState({});
      const [errorLoc, setErrorLoc]         = useState({});
      const [prefs, setPrefs]               = useState(() => store.get("prefs") || DEFAULT_PREFS);
      const [selActs, setSelActs]           = useState(() => store.get("acts") || ["run","walk"]);
      const [dismissed, setDismissed]       = useState(() => store.get("dismissed") || []);
      const [tab, setTab]                   = useState("today");
      const [showSettings, setShowSettings] = useState(false);
      const [syncStatus, setSyncStatus]     = useState(null);
      const [ghSha, setGhSha]               = useState(() => store.get("ghSha") || null);

      const STALE_MS  = 30 * 60 * 1000;
      const activeLoc = locations.find(l => l.id===activeLocId) || locations[0];
      const wx        = wxCache[activeLocId];
      const isLoading = loadingLoc[activeLocId];
      const error     = errorLoc[activeLocId];
      const signals   = processSignals(wx?.hourly);
      const insights  = generateInsights(wx?.current, wx?.hourly, signals);
      const allAlerts = generateAlerts(signals, prefs);
      const alerts    = allAlerts.filter(a => !dismissed.includes(a.id));
      const bg        = getBg(wx?.current?.condition || "clear", NOW_HOUR);

      const loadWeather = useCallback(async (loc) => {
        const cached = wxCache[loc.id];
        if (cached && Date.now()-cached.fetchedAt < STALE_MS) return;
        setLoadingLoc(p => ({ ...p, [loc.id]:true }));
        setErrorLoc(p => ({ ...p, [loc.id]:null }));
        try {
          const data = await fetchWeather(loc.lat, loc.lon);
          setWxCache(p => ({ ...p, [loc.id]:data }));
        } catch(e) {
          setErrorLoc(p => ({ ...p, [loc.id]: e.message || "Failed to fetch weather" }));
        } finally {
          setLoadingLoc(p => ({ ...p, [loc.id]:false }));
        }
      }, [wxCache]);

      useEffect(() => { if (activeLoc) loadWeather(activeLoc); }, [activeLocId, activeLoc?.id]);
      useEffect(() => { store.set("locId", activeLocId); },    [activeLocId]);
      useEffect(() => { store.set("prefs", prefs); },          [prefs]);
      useEffect(() => { store.set("acts", selActs); },         [selActs]);
      useEffect(() => { store.set("dismissed", dismissed); },  [dismissed]);
      useEffect(() => { store.set("locations", locations); },  [locations]);
      useEffect(() => {
        if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
      }, []);

      const handleSavePrefs = ({ locations: newLocs, ...rest }) => {
        setPrefs(rest);
        if (newLocs) {
          setLocations(newLocs);
          if (!newLocs.find(l => l.id===activeLocId)) setActiveLocId(newLocs[0].id);
          newLocs.forEach(loc => loadWeather(loc));
        }
      };

      const handleGhPull = async (token, repo) => {
        if (!token||!repo) { setSyncStatus("error"); return; }
        setSyncStatus("loading");
        try {
          const result = await ghRead(token, repo);
          if (!result) { setSyncStatus("error"); return; }
          const { content, sha } = result;
          if (content.locations) { setLocations(content.locations); store.set("locations", content.locations); }
          if (content.prefs)     { setPrefs(content.prefs); }
          if (content.selActs)   { setSelActs(content.selActs); }
          setGhSha(sha); store.set("ghSha", sha);
          setSyncStatus("success");
        } catch { setSyncStatus("error"); }
        setTimeout(() => setSyncStatus(null), 3000);
      };

      const handleGhPush = async (token, repo) => {
        if (!token||!repo) { setSyncStatus("error"); return; }
        setSyncStatus("loading");
        try {
          const payload = { version:PREFS_VERSION, locations, prefs, selActs, pushedAt:new Date().toISOString() };
          const result = await ghWrite(token, repo, payload, ghSha||undefined);
          const newSha = result?.content?.sha || ghSha;
          if (newSha) { setGhSha(newSha); store.set("ghSha", newSha); }
          setSyncStatus("success");
        } catch { setSyncStatus("error"); }
        setTimeout(() => setSyncStatus(null), 3000);
      };

      const toggleAct    = (k)  => setSelActs(p => p.includes(k) ? p.filter(x=>x!==k) : [...p,k]);
      const dismissAlert = (id) => setDismissed(p => [...p, id]);
      const lastUpdated  = wx ? `Updated ${Math.round((Date.now()-wx.fetchedAt)/60000)}m ago` : "";

      return (
        <div style={{ minHeight:"100vh", background:bg, transition:"background 1.5s ease", fontFamily:"'DM Sans',sans-serif", overflowX:"hidden" }}>
          <style>{FONT_STYLE}</style>

          {/* Header */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"18px 20px 0", maxWidth:480, margin:"0 auto" }}>
            <div style={{ fontFamily:"'Fraunces',serif", fontSize:20, fontWeight:400, color:"rgba(255,255,255,0.95)", letterSpacing:"-0.5px" }}>Atlas</div>
            <div style={{ display:"flex", gap:8, alignItems:"center" }}>
              {wx && (
                <button onClick={() => { setWxCache(p => { const n={...p}; delete n[activeLocId]; return n; }); loadWeather(activeLoc); }} style={{ width:32, height:32, borderRadius:10, background:"rgba(255,255,255,0.08)", border:"1px solid rgba(255,255,255,0.1)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:"rgba(255,255,255,0.5)" }}>
                  <RefreshCw size={13}/>
                </button>
              )}
              {alerts.length>0 && (
                <div style={{ width:32, height:32, borderRadius:10, background:"rgba(251,191,36,0.2)", border:"1px solid rgba(251,191,36,0.3)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                  <Bell size={14} style={{ color:"#fbbf24" }}/>
                </div>
              )}
              <button onClick={() => setShowSettings(true)} style={{ width:32, height:32, borderRadius:10, background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.12)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:"rgba(255,255,255,0.7)" }}>
                <Settings size={14}/>
              </button>
            </div>
          </div>

          {/* Location pills */}
          <div style={{ display:"flex", gap:8, padding:"12px 20px 0", maxWidth:480, margin:"0 auto", overflowX:"auto" }}>
            {locations.map(l => (
              <Pill key={l.id} active={activeLocId===l.id} onClick={() => setActiveLocId(l.id)}>{l.name}</Pill>
            ))}
          </div>

          {/* Hero */}
          <div style={{ maxWidth:480, margin:"0 auto" }}>
            {isLoading && <LoadingState />}
            {error && !isLoading && <ErrorState message={error} onRetry={() => { setErrorLoc(p=>({...p,[activeLocId]:null})); loadWeather(activeLoc); }} />}
            {wx && !isLoading && (
              <>
                <WeatherHero wx={wx.current} loc={activeLoc} />
                {lastUpdated && <div style={{ textAlign:"center", fontFamily:"'DM Sans'", fontSize:10, color:"rgba(255,255,255,0.2)", marginTop:4, letterSpacing:"0.05em" }}>{lastUpdated}</div>}
              </>
            )}
          </div>

          {/* Nav tabs */}
          <div style={{ display:"flex", justifyContent:"center", padding:"14px 20px", maxWidth:480, margin:"0 auto" }}>
            <div style={{ display:"flex", background:"rgba(255,255,255,0.08)", backdropFilter:"blur(12px)", borderRadius:14, padding:3, border:"1px solid rgba(255,255,255,0.1)", gap:2 }}>
              {[{id:"today",label:"Today",Icon:Sun},{id:"forecast",label:"Forecast",Icon:Calendar}].map(({id,label,Icon}) => (
                <button key={id} onClick={() => setTab(id)} style={{ padding:"7px 18px", borderRadius:11, border:"none", background:tab===id?"rgba(255,255,255,0.15)":"transparent", color:tab===id?"#fff":"rgba(255,255,255,0.5)", fontFamily:"'DM Sans'", fontSize:13, fontWeight:tab===id?600:400, cursor:"pointer", transition:"all 0.2s", display:"flex", alignItems:"center", gap:5 }}>
                  <Icon size={13}/>{label}
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          {wx && !isLoading && (
            <div style={{ maxWidth:480, margin:"0 auto", padding:"0 16px 80px" }}>
              <AlertBanner alerts={alerts} onDismiss={dismissAlert} />
              {tab==="today" && (
                <>
                  <HourlyScroller hourly={wx.hourly} />
                  <InsightList insights={insights} />
                  <ActivityPanel wx={wx.current} selActs={selActs} onToggle={toggleAct} />
                </>
              )}
              {tab==="forecast" && <DailyForecast daily={wx.daily} />}
            </div>
          )}

          {/* Settings */}
          {showSettings && (
            <SettingsDrawer
              prefs={prefs}
              onSavePrefs={handleSavePrefs}
              onClose={() => setShowSettings(false)}
              onSyncPull={handleGhPull}
              onSyncPush={handleGhPush}
              syncStatus={syncStatus}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
