    body{-webkit-tap-highlight-color:transparent;overflow-x:hidden;}
    .safe-top{padding-top:max(env(safe-area-inset-top,0px),18px);}
    .leaflet-container{background:#0a0f1e!important;}
    .leaflet-tile-pane{filter:saturate(0.65) brightness(0.8);}
    @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(18px)}}
    @keyframes drift2{0%,100%{transform:translateX(0)}50%{transform:translateX(-12px)}}
    @keyframes twinkle{0%,100%{opacity:.9}50%{opacity:.25}}
    @keyframes rainFall{from{transform:translateY(-40px) translateX(0)}to{transform:translateY(120vh) translateX(-30px)}}
    @keyframes snowFall{0%{transform:translateY(-10px) translateX(0);opacity:.9}100%{transform:translateY(110vh) translateX(30px);opacity:0}}
    @keyframes flash{0%,90%,100%{opacity:0}92%,98%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
    @keyframes shimmer{0%,100%{opacity:.15}50%{opacity:.35}}
    @keyframes glow{0%,100%{filter:blur(8px);opacity:.5}50%{filter:blur(14px);opacity:.8}}
  </style>

// ── RESPONSIVE HOOK ──────────────────────────────────────────────
function useWindowWidth(){
  const [w,setW]=useState(window.innerWidth);
  useEffect(()=>{
    function handle(){setW(window.innerWidth);}
    window.addEventListener("resize",handle);
    return()=>window.removeEventListener("resize",handle);
  },[]);
  return w;
}

// ── STORAGE ─────────────────────────────────────────────────────
const NS="atlas7_";
const store={
  get:k=>{try{const v=localStorage.getItem(NS+k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(NS+k,JSON.stringify(v));}catch{}},
};

// ── WMO ─────────────────────────────────────────────────────────
function wmoCondition(c){
  if(c===0)return"clear";if(c<=3)return"partly";if(c<=48)return"cloudy";
  if(c<=67)return"rain";if(c<=77)return"snow";if(c<=82)return"rain";return"storm";
}
function wmoDesc(c){
  if(c===0)return"Clear";if(c===1)return"Mostly Clear";if(c===2)return"Partly Cloudy";
  if(c===3)return"Overcast";if(c<=48)return"Foggy";if(c<=55)return"Drizzle";
  if(c<=67)return"Rain";if(c<=77)return"Snow";if(c<=82)return"Showers";return"Thunderstorms";
}
function wmoEmoji(c){
  if(c===0)return"☀️";if(c<=2)return"⛅";if(c===3)return"☁️";
  if(c<=48)return"🌫️";if(c<=67)return"🌧️";if(c<=77)return"❄️";
  if(c<=82)return"🌦️";return"⛈️";
}

function SceneNightClear(){
  const stars=useMemo(()=>Array.from({length:55},(_,i)=>({x:Math.sin(i*127.3)*47+50,y:Math.cos(i*78.9)*40+30,s:0.4+((i*31)%10)/20,d:((i*7)%4)+2})),[]);
  return(
    <div style={{position:"fixed",inset:0,zIndex:0,overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,#020408 0%,#0a0f1e 40%,#0f172a 70%,#1e1b4b 100%)"}}/>
      {/* Stars */}
      {stars.map((s,i)=>(
        <div key={i} style={{position:"absolute",left:s.x+"%",top:s.y+"%",width:s.s*3,height:s.s*3,borderRadius:"50%",background:"white",animation:"twinkle "+s.d+"s ease-in-out "+((i*0.3)%3)+"s infinite",opacity:s.s*1.8}}/>
      ))}
      {/* Moon */}
      <div style={{position:"absolute",top:"12%",right:"18%"}}>
        <svg width="70" height="70" viewBox="0 0 70 70">

// ── BACKGROUND SCENE SELECTOR ───────────────────────────────────
function WeatherBackground({cond,hour,temp}){
  const t=temp||65;
  const night=hour>=21||hour<6;
  const dawn=hour>=6&&hour<9;
  const dusk=hour>=17&&hour<21;

  if(cond==="storm") return <SceneStorm/>;
  if(cond==="snow") return <SceneSnow/>;
  if(cond==="rain") return <SceneRain/>;
  if(cond==="cloudy") return <SceneCloudy/>;

  if(night){
    if(t>=65) return <SceneNightWarm/>;
    return <SceneNightClear/>;
  }
  if(dawn||(!night&&!dusk&&hour>=6&&hour<17&&cond==="partly"&&t>75)) return <SceneSunrise/>;
  if(dusk) return <SceneSunset/>;
  // Clear/partly daytime
  if(t>=82) return <SceneHot/>;
  if(t<=40) return <SceneColdClear/>;
  return <SceneClearDay/>;
}

// ── COMFORT ENGINE ───────────────────────────────────────────────
function computeComfort(temp,humidity,wind,precipChance,uvIndex,sensitivity){
  const sens=sensitivity==="low"?0.7:sensitivity==="high"?1.3:1.0;
  let ts=100;
  if(temp>=62&&temp<=74)ts=100;
  else if(temp>=55&&temp<62)ts=100-(62-temp)*5;
  else if(temp>74&&temp<=82)ts=100-(temp-74)*5;
  else if(temp<55)ts=Math.max(0,60-(55-temp)*4);
  else ts=Math.max(0,60-(temp-82)*4);
  let hs=100;if(humidity>65)hs=100-(humidity-65)*1.5;if(humidity>85)hs=Math.max(0,hs-(humidity-85)*2);
  let ws=Math.max(0,100-(Math.max(0,wind-12))*4);
  let rs=Math.max(0,100-(Math.max(0,precipChance-20))*0.8);
  let us=Math.max(0,100-(Math.max(0,uvIndex-5))*8);
  const raw=(ts*0.4+hs*0.2+ws*0.2+rs*0.15+us*0.05);
  const adj=Math.round(Math.min(100,Math.max(0,raw+(100-raw)*(1-sens)*0.2)));
  return{score:adj,category:adj>=80?"excellent":adj>=60?"good":adj>=40?"fair":"poor"};
}

// ── CLOTHING ENGINE (no external API) ────────────────────────────────
function getClothingAdvice(wx, prefs) {
  if (!wx) return null;
  var profile = prefs.tempProfile || "normal";
  var offset = profile === "cold" ? 8 : profile === "warm" ? -8 : 0;
  var windChill = wx.wind >= 20 ? 5 : wx.wind >= 12 ? 2 : 0;
  var adj = wx.feelsLike - offset - windChill;
  var precip = wx.precipChance;
  var uv = wx.uvIndex;
  var wear = [], bring = [], leave = [];
  function add(key, label, emoji, status) {
    var bucket = (status === "wear" || status === "apply") ? wear
               : (status === "bring" || status === "consider") ? bring
               : leave;
    bucket.push({ key:key, label:label, emoji:emoji, status:status });
  }
  // Shirt sleeve
  if (adj >= 72) add("shirt", "Short sleeve", "👕", "wear");
  else add("shirt", "Long sleeve", "👔", "wear");
  // Bottoms
  if (adj >= 70) add("bottom", "Shorts", "🩳", "wear");
  else add("bottom", "Pants", "👖", "wear");
  // Jacket
  if (adj <= 28) add("jacket", "Heavy coat", "🧥", "wear");
  else if (adj <= 42) add("jacket", "Heavy jacket", "🧥", "wear");
  else if (adj <= 55) add("jacket", "Light jacket", "🧥", "wear");
  else if (adj <= 65) add("jacket", "Light jacket", "🧥", "bring");
  else add("jacket", "Jacket", "🧥", "leave");
  // Beanie
  if (adj <= 38) add("beanie", "Beanie", "🧢", "wear");
  else if (adj <= 50) add("beanie", "Beanie", "🧢", "bring");
  else add("beanie", "Beanie", "🧢", "leave");
  // Gloves
  if (adj <= 30) add("gloves", "Gloves", "🧤", "wear");
  else if (adj <= 44) add("gloves", "Gloves", "🧤", "bring");
  else add("gloves", "Gloves", "🧤", "leave");
  // Umbrella
  if (precip >= 65) add("umbrella", "Umbrella", "☂️", "bring");
  else if (precip >= 35) add("umbrella", "Umbrella", "☂️", "consider");
  else add("umbrella", "Umbrella", "☂️", "leave");
  // Sunscreen
  if (uv >= 6) add("sunscreen", "Sunscreen", "🧴", "apply");
  else if (uv >= 3) add("sunscreen", "Sunscreen", "🧴", "bring");
  else add("sunscreen", "Sunscreen", "🧴", "leave");
  return { wear:wear, bring:bring, leave:leave };
}

// ── ATMOSPHERE ENGINE ────────────────────────────────────────────
function getAtmosphere(cond,hour,temp,wind){
  const night=hour>=21||hour<6,dawn=hour>=6&&hour<9,dusk=hour>=17&&hour<21;
  const mo=new Date().getMonth();
  const isSum=mo>=5&&mo<=8,isFall=mo>=9&&mo<=11,isSpr=mo>=3&&mo<=5;
  if(cond==="storm")return night?"Stormy night ahead":"Stormy conditions moving in";
  if(cond==="snow")return night?"Quiet snowfall tonight":"Snow in the air";
  if(cond==="rain"){if(night)return"Soft rain in the dark";if(dusk)return"Rainy evening setting in";if(wind>20)return"Wet and blustery";return"A gentle rainy day";}
  if(cond==="cloudy"){if(night)return"Overcast and still tonight";if(temp<45)return"Cold and grey";if(isFall)return"Classic autumn grey";return"Quiet overcast day";}
  if(dawn){if(isSpr)return"Fresh spring morning";if(isSum)return"Bright summer morning";if(isFall)return"Crisp autumn dawn";return"Still winter morning";}
  if(hour>=9&&hour<12){if(temp<50)return"Brisk and clear";if(temp<65)return"Beautiful morning outside";return"Warm, clear morning";}
  if(hour>=12&&hour<17){if(temp>=68&&temp<=78&&wind<12)return"Perfect afternoon outside";if(temp>85)return"Hot and sunny afternoon";if(isSpr)return"Lovely spring afternoon";return"Clear afternoon";}
  if(dusk){if(temp>=60&&temp<=75)return"Golden hour — ideal porch weather";if(isSum)return"Warm summer evening";if(isFall)return"Autumn evening glow";return"Quiet evening light";}
  if(night){if(temp>=55&&temp<=68)return"Windows-open kind of night";if(temp<40)return"Cold clear night";if(isSum)return"Warm summer night";return"Calm night";}
  return"Mostly clear skies";
}

// ── NARRATIVE ENGINE ─────────────────────────────────────────────
function generateNarrative(current,daily,hourly){
  if(!current||!daily||!hourly)return"";
  const d=daily[0]||{};
  const rainHours=hourly.filter(h=>h.precipChance>=50);
  const hasEveRain=rainHours.some(h=>h.hour>=17&&h.hour<=22);
  const hasMornRain=rainHours.some(h=>h.hour>=6&&h.hour<=12);
  const hasAllRain=rainHours.length>=8;
  const cond=current.condition,temp=current.temp;
  const mo=new Date().getMonth();
  const isSpr=mo>=3&&mo<=5,isFall=mo>=9&&mo<=11,isSum=mo>=5&&mo<=8;
  if(cond==="storm")return"Stormy weather today — keep plans flexible and stay sheltered.";
  if(cond==="snow")return"Snow is in the forecast. Allow extra travel time and dress in layers.";
  if(hasAllRain)return"A rainy day from start to finish. A good one to stay cosy inside.";
  if(hasMornRain&&!hasEveRain)return"Rain this morning clears up later — afternoon looks pleasant.";
  if(hasEveRain&&!hasMornRain){if(temp>65)return"Warm and clear through most of the day, with rain arriving this evening.";return"Dry through the day with rain expected this evening.";}
  if(cond==="cloudy")return"Overcast and quiet. Good light for being outside without the glare.";
  if(cond==="partly")return"A mix of sun and clouds. Comfortable and calm conditions throughout.";
  if(cond==="clear"){
    if(temp>=68&&temp<=80)return isSum?"Classic summer day — warm, bright, and ideal for being outside.":"Warm and sunny — make the most of it.";
    if(temp>80)return"Hot and sunny today. UV peaks midday — sunscreen and shade recommended.";
    if(temp<45)return"Cold and clear. The sun is out but keep layers on.";
    if(isSpr)return"A beautiful spring day. Comfortable temperatures and clear skies.";
    if(isFall)return"Crisp autumn day with clear skies.";
  }
  return"Conditions look comfortable throughout the day.";
}

// ── BEST TIME ENGINE ─────────────────────────────────────────────
function getBestTimes(hourly,prefs){
  if(!hourly||!hourly.length)return[];
  const sens=prefs.temperatureSensitivity||"medium";
  const res=[];
  const outdoor=hourly.filter(h=>h.hour>=7&&h.hour<=20);
  let bc=0,bw=null;
  outdoor.forEach(h=>{
    const c=computeComfort(h.temp,h.humidity,h.wind,h.precipChance,0,sens);
    if(c.score>bc&&c.score>=65){bc=c.score;bw=h;}
  });
  if(bw){
    const eh=Math.min(bw.hour+3,20);
    const el=(eh%12||12)+(eh<12?"a":"p");
    res.push({id:"outdoor",icon:"✨",label:"Best time outside",value:bw.hourLabel+"–"+el,detail:bc>=85?"Excellent conditions":"Comfortable conditions"});
  }
  const night=hourly.filter(h=>(h.hour>=20||h.hour<6));
  if(night.filter(h=>h.temp>=54&&h.temp<=70&&h.humidity<72&&h.precipChance<20).length>=3)
    res.push({id:"windows",icon:"🪟",label:"Open the windows",value:"Tonight looks ideal",detail:"Cool, dry air overnight"});
  const ch=prefs.commuteHours||{};
  const ms=ch.morningStart!=null?ch.morningStart:7,me=ch.morningEnd!=null?ch.morningEnd:9;
  const mc=hourly.filter(h=>h.hour>=ms&&h.hour<=me);
  if(mc.some(h=>h.precipChance>=50))
    res.push({id:"commute",icon:"☂️",label:"Morning commute",value:"Rain expected",detail:"Allow extra time"});
  const sh=hourly.filter(h=>h.hour>=22||h.hour<=5);
  if(sh.length>=4){
    const avg=sh.reduce((a,h)=>a+h.temp,0)/sh.length;
    if(avg>=60&&avg<=70)res.push({id:"sleep",icon:"😴",label:"Sleep conditions",value:"Comfortable tonight",detail:Math.round(avg)+"° overnight"});
    else if(avg>78)res.push({id:"sleep",icon:"🌡️",label:"Warm overnight",value:Math.round(avg)+"° tonight",detail:"Consider A/C or a fan"});
  }
  return res.slice(0,3);
}

// ── PLANNING CONFIDENCE ──────────────────────────────────────────
function getPlanningConfidence(hourly){
  if(!hourly)return{label:"Checking conditions…",dot:"#888"};
  const mx=Math.max(...hourly.slice(0,12).map(h=>h.precipChance));
  const vol=hourly.slice(0,8).reduce((acc,h,i,arr)=>i===0?acc:acc+Math.abs(h.precipChance-(arr[i-1].precipChance)),0);
  if(mx<15&&vol<30)return{label:"Outdoor plans look safe today",dot:"#4ade80"};
  if(mx<35||vol<50)return{label:"Mostly good — light chance of rain",dot:"#a3e635"};
  if(mx<60)return{label:"Backup indoor option recommended",dot:"#fbbf24"};
  return{label:"Conditions may change quickly",dot:"#f87171"};
}

// ── ENV MEMORY ───────────────────────────────────────────────────
function updateEnvMemory(current){
  if(!current)return null;
  const mem=store.get("envMemory")||{};
  const today=new Date().toDateString();
  if(current.temp<=32&&mem.lastFreezeDate!==today){
    if(!mem.lastFreezeDate||Date.now()-new Date(mem.lastFreezeDate).getTime()>30*86400000)
      mem.firstFreezeAlert=true;
    mem.lastFreezeDate=today;
  }
  store.set("envMemory",mem);
  return mem;
}

// ── GEOCODING & WEATHER ──────────────────────────────────────────
const USER_TZ=Intl.DateTimeFormat().resolvedOptions().timeZone;
async function geocode(q){
  const r=await fetch("https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=6&language=en&format=json");
  const d=await r.json();
  return(d.results||[]).map(x=>({id:x.latitude.toFixed(2)+"_"+x.longitude.toFixed(2),name:x.name,region:[x.admin1,x.country_code].filter(Boolean).join(", "),lat:x.latitude,lon:x.longitude}));
}
async function reverseGeocode(lat,lon){
  try{
    const r=await fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lon+"&format=json",{headers:{"Accept-Language":"en"}});
    const d=await r.json();
    return{name:d.address.city||d.address.town||d.address.village||d.address.county||"My Location",region:(d.address.state_code||d.address.country_code||"").toUpperCase()};
  }catch{return{name:"My Location",region:""};}
}
async function fetchWeather(lat,lon){
  const url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+
    "&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode,windspeed_10m,relativehumidity_2m,uv_index,visibility"+
    "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,windspeed_10m_max,uv_index_max"+
    "&current_weather=true&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=auto&forecast_days=7";
  const r=await fetch(url);if(!r.ok)throw new Error("Weather API "+r.status);
  return transformWeather(await r.json());
}
function transformWeather(raw){
  const cw=raw.current_weather,h=raw.hourly,d=raw.daily;
  const cwH=cw.time?cw.time.slice(0,13):"";
  let ci=cwH?h.time.findIndex(t=>t.slice(0,13)===cwH):0;if(ci<0)ci=0;
  const localHour=parseInt((cw.time||"T00").slice(11,13),10);
  const current={
    temp:Math.round(cw.temperature),feelsLike:Math.round(h.apparent_temperature[ci]!=null?h.apparent_temperature[ci]:cw.temperature),
    condition:wmoCondition(cw.weathercode),description:wmoDesc(cw.weathercode),wmoCode:cw.weathercode,
    humidity:h.relativehumidity_2m[ci]||0,wind:Math.round(cw.windspeed),
    visibility:Math.round((h.visibility[ci]||10000)/1609.34),uvIndex:Math.round(h.uv_index[ci]||0),
    high:Math.round(d.temperature_2m_max[0]),low:Math.round(d.temperature_2m_min[0]),
    precipChance:h.precipitation_probability[ci]||0,localHour,
  };
  const hourlyOut=[];
  for(let i=0;i<24;i++){
    const idx=ci+i;if(idx>=h.time.length)break;
    const hr=parseInt(h.time[idx].slice(11,13),10);
    hourlyOut.push({hour:hr,hourLabel:(hr%12||12)+(hr<12?"a":"p"),temp:Math.round(h.temperature_2m[idx]),
      condition:wmoCondition(h.weathercode[idx]),wmoCode:h.weathercode[idx],
      precipChance:h.precipitation_probability[idx]||0,wind:Math.round(h.windspeed_10m[idx]),
      humidity:h.relativehumidity_2m[idx]||0,uvIndex:Math.round(h.uv_index[idx]||0)});
  }
  const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dailyOut=d.time.map((t,i)=>({
    day:i===0?"Today":DAYS[new Date(t+"T12:00:00").getDay()],
    high:Math.round(d.temperature_2m_max[i]),low:Math.round(d.temperature_2m_min[i]),
    condition:wmoCondition(d.weathercode[i]),wmoCode:d.weathercode[i],
    precip:d.precipitation_probability_max[i]||0,wind:Math.round(d.windspeed_10m_max[i]),
    uvMax:Math.round((d.uv_index_max||[])[i]||0),
  }));
  return{current,hourly:hourlyOut,daily:dailyOut,fetchedAt:Date.now()};
}

// ── SIGNALS & ALERTS ──────────────────────────────────────────────
function processSignals(hourly){
  const sigs=[];if(!hourly||!hourly.length)return sigs;
  let rs=null,re=null;
  for(let i=0;i<hourly.length;i++){if(hourly[i].precipChance>=50){if(rs===null)rs=i;re=i;}}
  if(rs!==null){
    let mx=0;hourly.slice(rs,re+1).forEach(h=>{if(h.precipChance>mx)mx=h.precipChance;});
    sigs.push({type:"rain_window",startIdx:rs,endIdx:re,start:hourly[rs].hourLabel,end:hourly[re].hourLabel,intensity:mx>80?"heavy":mx>60?"moderate":"light"});
  }
  let early=0,late=0;
  hourly.slice(0,6).forEach(h=>early+=h.temp);early/=6;
  hourly.slice(18,24).forEach(h=>late+=h.temp);late/=6;
  const delta=Math.round(late-early);
  if(Math.abs(delta)>=8)sigs.push({type:"temp_trend",direction:delta<0?"falling":"rising",delta:Math.abs(delta)});
  return sigs;
}
function generateAlerts(signals,prefs,hourly,envMemory){
  const out=[];
  const rain=signals.find(s=>s.type==="rain_window");
  if(rain&&hourly){
    const ch=prefs.commuteHours||{};
    const ms=ch.morningStart!=null?ch.morningStart:7,me=ch.morningEnd!=null?ch.morningEnd:9;
    const es=ch.eveningStart!=null?ch.eveningStart:17,ee=ch.eveningEnd!=null?ch.eveningEnd:19;
    const rh=hourly.slice(rain.startIdx,rain.endIdx+1);
    if(rh.some(h=>h.hour>=ms&&h.hour<=me))out.push({id:"morning_rain",severity:"warning",title:"Rain during your morning commute",message:"Rain "+rain.start+"–"+rain.end+". Umbrella recommended."});
    else if(rh.some(h=>h.hour>=es&&h.hour<=ee))out.push({id:"evening_rain",severity:"warning",title:"Rain on your way home",message:"Rain expected "+rain.start+"–"+rain.end+". Plan accordingly."});
  }
  const trend=signals.find(s=>s.type==="temp_trend");
  if(trend&&trend.direction==="falling"&&trend.delta>=15)out.push({id:"rapid_drop",severity:"info",title:"Temperature drops "+trend.delta+"° tonight",message:"Sharp fall expected. A layer will help."});
  if(envMemory&&envMemory.firstFreezeAlert)out.push({id:"first_freeze",severity:"warning",title:"First freeze of the season",message:"Consider turning off outdoor water lines and protecting plants."});
  return out;
}

// ── INSIGHT LIST ──────────────────────────────────────────────────
function InsightList({current,hourly,sigs,prefs}){
  const out=[];
  if(!current||!hourly)return null;
  const rain=sigs.find(s=>s.type==="rain_window");
  if(rain){const pi=rain.startIdx+Math.floor((rain.endIdx-rain.startIdx)/2);out.push({id:"rain",icon:"🌧️",title:rain.intensity.charAt(0).toUpperCase()+rain.intensity.slice(1)+" rain arriving "+rain.start,description:"Give yourself a few extra minutes to plan around it."});}
  if(current.wind>=18)out.push({id:"wind",icon:"🍽️",title:"Wind may disrupt outdoor dining",description:current.wind+" mph winds — open-air spots could feel uncomfortable."});
  if(prefs.hasPets&&current.temp>88)out.push({id:"pets",icon:"🐾",title:"Hot for pets outside",description:"Avoid extended outdoor time with pets today."});
  if(prefs.hasGarden&&rain)out.push({id:"garden",icon:"🌿",title:"Good day to skip watering",description:"Rain is coming — your garden will take care of itself today."});
  const trend=sigs.find(s=>s.type==="temp_trend");
  if(trend)out.push({id:"trend",icon:trend.direction==="falling"?"🌡️":"🌤️",title:"Temperatures "+trend.direction+" "+trend.delta+"° later",description:trend.direction==="falling"?"A notable drop tonight. A layer will keep you comfortable.":"It warms up significantly through the afternoon."});
  if(current.uvIndex>=7)out.push({id:"uv",icon:"☀️",title:"High UV today",description:"SPF 30+ if you're outside between 10am and 3pm."});
  if(!out.length)return null;
  return(<div style={{marginBottom:16}}><SectionLabel>What it means for you</SectionLabel><div style={{display:"flex",flexDirection:"column",gap:8}}>{out.slice(0,4).map(ins=><Card key={ins.id} style={{display:"flex",gap:12,alignItems:"flex-start",padding:"13px 14px"}}><div style={{fontSize:20,flexShrink:0,marginTop:1}}>{ins.icon}</div><div><div style={{fontFamily:"'DM Sans'",fontWeight:600,fontSize:14,color:"#f1f5f9",marginBottom:3}}>{ins.title}</div><div style={{fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,0.6)",lineHeight:1.6}}>{ins.description}</div></div></Card>)}</div></div>);
}

// ── COMMUTE CARD ──────────────────────────────────────────────────
function CommuteCard({hourly,prefs}){
  const ch=prefs.commuteHours||{};
  const ms=ch.morningStart!=null?ch.morningStart:7,me=ch.morningEnd!=null?ch.morningEnd:9;
  const es=ch.eveningStart!=null?ch.eveningStart:17,ee=ch.eveningEnd!=null?ch.eveningEnd:19;
  function getWin(s,e){
    if(!hourly||!hourly.length)return null;
    const win=hourly.filter(h=>h.hour>=s&&h.hour<=e);if(!win.length)return null;
    const avgTemp=Math.round(win.reduce((a,h)=>a+h.temp,0)/win.length);
    let mx=0,wc=0;win.forEach(h=>{if(h.precipChance>mx)mx=h.precipChance;if(h.wmoCode>wc)wc=h.wmoCode;});
    return{avgTemp,maxPrecip:mx,wmoCode:wc};
  }
  const fmt=i=>(i%12||12)+(i<12?"a":"p");
  const morning=getWin(ms,me),evening=getWin(es,ee);
  if(!morning&&!evening)return null;
  return(<div style={{marginBottom:16}}><SectionLabel>Commute</SectionLabel><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{[{label:"Morning",time:fmt(ms)+"–"+fmt(me),data:morning},{label:"Evening",time:fmt(es)+"–"+fmt(ee),data:evening}].map(({label,time,data})=><Card key={label} style={{padding:"14px"}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:10}}><Icon name="Clock" size={11} style={{color:"rgba(255,255,255,0.45)"}}/><div style={{fontFamily:"'DM Sans'",fontSize:10,fontWeight:600,color:"rgba(255,255,255,0.45)",letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</div></div>{data?<div><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}><span style={{fontSize:22}}>{wmoEmoji(data.wmoCode)}</span><span style={{fontFamily:"'Fraunces',serif",fontSize:30,fontWeight:300,color:"#f1f5f9",letterSpacing:"-1px"}}>{data.avgTemp}°</span></div><div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.4)"}}>{time}</div>{data.maxPrecip>=20&&<div style={{fontFamily:"'DM Sans'",fontSize:11,color:"#93c5fd",marginTop:4}}>☂️ {data.maxPrecip}% rain</div>}</div>:<div style={{fontFamily:"'DM Sans'",fontSize:13,color:"rgba(255,255,255,0.3)"}}>—</div>}</Card>)}</div></div>);
}

// ── CLOTHING CARD ─────────────────────────────────────────────────
function ClothingCard({wx,prefs}){
  var advice=useMemo(function(){return getClothingAdvice(wx,prefs);},[wx&&wx.temp,wx&&wx.feelsLike,wx&&wx.wind,wx&&wx.precipChance,wx&&wx.uvIndex,wx&&wx.condition,prefs.tempProfile]);
  if(!advice)return null;
  var allItems=advice.wear.concat(advice.bring).concat(advice.leave);
  function statusColor(s){return s==="wear"||s==="apply"?"#4ade80":s==="bring"||s==="consider"?"#fbbf24":"rgba(255,255,255,0.25)";}

    <div style={{marginBottom:16}}>
      <SectionLabel>What to wear</SectionLabel>
      <Card style={{padding:"14px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

              <div>

                <span style={{fontFamily:"'DM Sans'",fontSize:10,fontWeight:600,color:statusColor(item.status),letterSpacing:"0.06em",textTransform:"uppercase"}}>{statusLabel(item.status)}</span>
              </div>

      </Card>

}

// ── RADAR MAP ─────────────────────────────────────────────────────
function RadarMap({lat,lon}){
  const mapRef=useRef(null);const mapInst=useRef(null);const radarRef=useRef(null);
  const [status,setStatus]=useState("loading");
  useEffect(()=>{
    if(!mapRef.current||mapInst.current)return;
    const map=L.map(mapRef.current,{center:[lat,lon],zoom:7,zoomControl:true,attributionControl:false});
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{subdomains:"abcd",maxZoom:19}).addTo(map);
    L.circleMarker([lat,lon],{radius:8,fillColor:"#38bdf8",fillOpacity:0.9,color:"#fff",weight:2}).addTo(map);
    mapInst.current=map;
    loadRadar(map);
    return()=>{map.remove();mapInst.current=null;};
  },[]);
  useEffect(()=>{if(mapInst.current)mapInst.current.setView([lat,lon],7,{animate:true});},[lat,lon]);
  async function loadRadar(map){
    try{
      const r=await fetch("https://api.rainviewer.com/public/weather-maps.json");
      const data=await r.json();
      const frames=data.radar&&data.radar.past;
      if(!frames||!frames.length)throw new Error("no frames");
      const latest=frames[frames.length-1];
      if(radarRef.current)map.removeLayer(radarRef.current);
      radarRef.current=L.tileLayer("https://tilecache.rainviewer.com"+latest.path+"/256/{z}/{x}/{y}/2/1_1.png",{opacity:0.7,zIndex:100,tileSize:256});
      radarRef.current.addTo(map);
      setStatus("ready");
    }catch{setStatus("error");}
  }
  return(
    <div style={{marginBottom:16}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <SectionLabel style={{marginBottom:0}}>Precipitation Radar</SectionLabel>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {status==="loading"&&<span style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.35)",display:"flex",alignItems:"center",gap:4}}><Icon name="Loader" size={11} style={{animation:"spin 1s linear infinite"}}/>Loading…</span>}
          {status==="error"&&<span style={{fontFamily:"'DM Sans'",fontSize:11,color:"#f87171"}}>Radar unavailable</span>}
          <button onClick={()=>{setStatus("loading");if(mapInst.current)loadRadar(mapInst.current);}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.35)",padding:"2px 4px"}}><Icon name="RefreshCw" size={12}/></button>
        </div>
      </div>
      <div style={{borderRadius:16,overflow:"hidden",border:"1px solid rgba(255,255,255,0.12)"}}><div ref={mapRef} style={{height:300}}/></div>
      <div style={{fontFamily:"'DM Sans'",fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:6,textAlign:"center"}}>Radar © RainViewer · Map © CartoDB / OpenStreetMap</div>
    </div>
  );
}

        </div>

// ── APP ───────────────────────────────────────────────────────────
function App(){
  const [locations,setLocations]       = useState(store.get("locations")||DEFAULT_LOCATIONS);
  const [activeLocId,setActiveLocId]   = useState(store.get("locId")||DEFAULT_LOCATIONS[0].id);
  const [wxCache,setWxCache]           = useState({});
  const [loadingLoc,setLoadingLoc]     = useState({});
  const [errorLoc,setErrorLoc]         = useState({});
  const [prefs,setPrefs]               = useState(store.get("prefs")||DEFAULT_PREFS);
  const [dismissed,setDismissed]       = useState(store.get("dismissed")||[]);
  const [tab,setTab]                   = useState("today");
  const [showSettings,setShowSettings] = useState(false);
  const [showGroups,setShowGroups]     = useState(false);
  const [syncStatus,setSyncStatus]     = useState(null);
  const [groups,setGroups]             = useState(store.get("groups")||[]);
  const [editingGroup,setEditingGroup] = useState(null);
  const [locLoading,setLocLoading]     = useState(false);
  const [envMemory,setEnvMemory]       = useState(store.get("envMemory")||{});

  const STALE=30*60*1000;
  const winW=useWindowWidth();
  const isIPad=winW>=768;
  const activeLoc=locations.find(l=>l.id===activeLocId)||locations[0];
  const wx=wxCache[activeLocId];
  const isLoading=!!loadingLoc[activeLocId];
  const error=errorLoc[activeLocId];
  const signals=processSignals(wx?wx.hourly:null);
  const allAlerts=generateAlerts(signals,prefs,wx?wx.hourly:null,envMemory);
  const alerts=allAlerts.filter(a=>dismissed.indexOf(a.id)<0);
  const localHour=wx&&wx.current?wx.current.localHour:new Date().getHours();

  const loadWeather=useCallback(async loc=>{
    const cached=wxCache[loc.id];
    if(cached&&Date.now()-cached.fetchedAt<STALE)return;
    setLoadingLoc(p=>Object.assign({},p,{[loc.id]:true}));
    setErrorLoc(p=>Object.assign({},p,{[loc.id]:null}));
    try{
      const data=await fetchWeather(loc.lat,loc.lon);
      setWxCache(p=>Object.assign({},p,{[loc.id]:data}));
      const mem=updateEnvMemory(data.current);if(mem)setEnvMemory(mem);
    }catch(e){setErrorLoc(p=>Object.assign({},p,{[loc.id]:e.message||"Failed to fetch weather"}));}
    finally{setLoadingLoc(p=>Object.assign({},p,{[loc.id]:false}));}
  },[wxCache]);

  // Geolocation on mount
  useEffect(()=>{
    if(navigator.geolocation){
      setLocLoading(true);
      navigator.geolocation.getCurrentPosition(
        async pos=>{
          const lat=pos.coords.latitude,lon=pos.coords.longitude;
          const {name,region}=await reverseGeocode(lat,lon);
          const myLoc={id:"my_location",name,region,lat:parseFloat(lat.toFixed(4)),lon:parseFloat(lon.toFixed(4)),isCurrentLocation:true};
          setLocations(prev=>[myLoc,...prev.filter(l=>!l.isCurrentLocation)]);
          if(!store.get("locId"))setActiveLocId("my_location");
          setLocLoading(false);loadWeather(myLoc);
        },
        ()=>setLocLoading(false),{timeout:8000}
      );
    }
  },[]);

  useEffect(()=>{if(activeLoc)loadWeather(activeLoc);},[activeLocId]);
  useEffect(()=>{if(showGroups)groups.forEach(g=>g.locationIds.forEach(id=>{const l=locations.find(x=>x.id===id);if(l)loadWeather(l);}));},[showGroups]);
  useEffect(()=>{store.set("locId",activeLocId);},[activeLocId]);
  useEffect(()=>{store.set("prefs",prefs);},[prefs]);
  useEffect(()=>{store.set("dismissed",dismissed);},[dismissed]);
  useEffect(()=>{store.set("locations",locations);},[locations]);
  useEffect(()=>{store.set("groups",groups);},[groups]);
  useEffect(()=>{if("serviceWorker" in navigator)navigator.serviceWorker.register("/sw.js").catch(()=>{});},[]);

  const handleSavePrefs=data=>{const nl=data.locations;const rest=Object.assign({},data);delete rest.locations;setPrefs(rest);if(nl){setLocations(nl);if(!nl.find(l=>l.id===activeLocId))setActiveLocId(nl[0].id);nl.forEach(l=>loadWeather(l));}};

  // Firebase save/load
  const handleFbSave=async(dbUrl,key)=>{
    if(!dbUrl||!key){setSyncStatus("error");return;}setSyncStatus("loading");
    try{
      const payload={version:PREFS_VERSION,locations,prefs,groups,savedAt:new Date().toISOString()};
      await fbSave(dbUrl,key,payload);setSyncStatus("success");
    }catch{setSyncStatus("error");}
    setTimeout(()=>setSyncStatus(null),3000);
  };
  const handleFbLoad=async(dbUrl,key,onKeyAccepted)=>{
    if(!dbUrl||!key){setSyncStatus("error");return;}setSyncStatus("loading");
    try{
      const data=await fbLoad(dbUrl,key);
      if(!data){setSyncStatus("error");return;}
      if(data.locations){setLocations(data.locations);store.set("locations",data.locations);}
      if(data.prefs)setPrefs(data.prefs);
      if(data.groups){setGroups(data.groups);store.set("groups",data.groups);}
      store.set("syncKey",key);
      if(onKeyAccepted)onKeyAccepted(key);
      setSyncStatus("success");
    }catch{setSyncStatus("error");}
    setTimeout(()=>setSyncStatus(null),3000);
  };

  const handleSaveGroup=g=>{setGroups(p=>{const e=p.find(x=>x.id===g.id);return e?p.map(x=>x.id===g.id?g:x):[...p,g];});g.locationIds.forEach(id=>{const l=locations.find(x=>x.id===id);if(l)loadWeather(l);});setEditingGroup(null);};
  const handleDeleteGroup=id=>{setGroups(p=>p.filter(g=>g.id!==id));setEditingGroup(null);};
  const handleSelectGroupCity=loc=>{setLocations(p=>p.find(l=>l.id===loc.id)?p:[...p,loc]);setActiveLocId(loc.id);setTab("today");};
  const moveGroup=(id,dir)=>setGroups(p=>{const idx=p.findIndex(g=>g.id===id);const n=p.slice();const t=idx+dir;if(t<0||t>=n.length)return p;[n[idx],n[t]]=[n[t],n[idx]];return n;});
  const refreshLoc=()=>{if(!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(async pos=>{const lat=pos.coords.latitude,lon=pos.coords.longitude;const {name,region}=await reverseGeocode(lat,lon);const myLoc={id:"my_location",name,region,lat:parseFloat(lat.toFixed(4)),lon:parseFloat(lon.toFixed(4)),isCurrentLocation:true};setLocations(p=>[myLoc,...p.filter(l=>!l.isCurrentLocation)]);setWxCache(p=>{const n=Object.assign({},p);delete n["my_location"];return n;});setActiveLocId("my_location");loadWeather(myLoc);},()=>{},{timeout:8000});};
  const dismissAlert=id=>setDismissed(p=>[...p,id]);
  const lastUpdated=wx?"Updated "+Math.round((Date.now()-wx.fetchedAt)/60000)+"m ago":"";
  const NAV=[{id:"today",label:"Today",icon:"Sun"},{id:"forecast",label:"Forecast",icon:"Calendar"},{id:"radar",label:"Radar",icon:"CloudRain"}];
  const bgCond=wx&&wx.current?wx.current.condition:"clear";
  const bgTemp=wx&&wx.current?wx.current.temp:65;

  return(
    <div style={{minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",overflowX:"hidden",position:"relative"}}>
      <style>{FONT_STYLE}</style>

      {/* ── ILLUSTRATED BACKGROUND ── */}
      <WeatherBackground cond={bgCond} hour={localHour} temp={bgTemp}/>

      {/* ── CONTENT LAYER ── */}
      <div style={{position:"relative",zIndex:1}}>

        {/* HEADER */}
        <div className="safe-top">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 18px 12px",maxWidth:isIPad?960:480,margin:"0 auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><AtlasIcon size={36}/><span style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:400,color:"rgba(255,255,255,0.95)",letterSpacing:"0.06em",textShadow:"0 1px 6px rgba(0,0,0,0.5)"}}>ATLAS</span></div>
            <div style={{display:"flex",gap:7,alignItems:"center"}}>
              <IconBtn onClick={refreshLoc} style={{color:locLoading?"#38bdf8":"rgba(255,255,255,0.6)"}}><Icon name="Crosshair" size={14}/></IconBtn>
              {wx&&tab!=="radar"&&<IconBtn onClick={()=>{const n=Object.assign({},wxCache);delete n[activeLocId];setWxCache(n);loadWeather(activeLoc);}}><Icon name="RefreshCw" size={13}/></IconBtn>}
              {alerts.length>0&&<div style={{width:34,height:34,borderRadius:10,background:"rgba(251,191,36,0.2)",border:"1px solid rgba(251,191,36,0.4)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="Bell" size={14} style={{color:"#fbbf24"}}/></div>}
              <IconBtn onClick={()=>setShowSettings(true)} style={{color:"rgba(255,255,255,0.7)"}}><Icon name="Settings" size={14}/></IconBtn>
            </div>
          </div>
        </div>

        {/* LOCATION PILLS */}
        <div style={{display:"flex",gap:7,padding:"0 18px",maxWidth:isIPad?960:480,margin:"0 auto",overflowX:"auto",alignItems:"center"}}>
          <Pill active={false} onClick={()=>setShowGroups(true)} style={{background:"rgba(0,0,0,0.25)",border:"1px solid rgba(255,255,255,0.18)",color:"rgba(255,255,255,0.7)",display:"flex",alignItems:"center",gap:5}}>
            <Icon name="Layers" size={11}/> Groups
          </Pill>
          <div style={{width:1,height:18,background:"rgba(255,255,255,0.15)",flexShrink:0}}/>
          {locations.map(l=>(
            <Pill key={l.id} active={activeLocId===l.id} onClick={()=>setActiveLocId(l.id)}>
              {l.isCurrentLocation?"📍 ":""}{l.name}
            </Pill>
          ))}
        </div>

        {isIPad?(
          /* ── iPAD 2-COLUMN LAYOUT ── */
          <div style={{maxWidth:960,margin:"0 auto",padding:"0 18px",display:"flex",gap:20,alignItems:"flex-start"}}>

            {/* LEFT COLUMN — hero + narrative */}
            <div style={{flex:"0 0 400px",position:"sticky",top:0}}>
              {isLoading&&<LoadingState/>}
              {error&&!isLoading&&<ErrorState message={error} onRetry={()=>{setErrorLoc(p=>Object.assign({},p,{[activeLocId]:null}));loadWeather(activeLoc);}}/>}
              {wx&&!isLoading&&(
                <div>
                  <WeatherHero wx={wx.current} loc={activeLoc} prefs={prefs}/>
                  <AtmosphereTag cond={wx.current.condition} hour={localHour} temp={wx.current.temp} wind={wx.current.wind}/>
                  <DailyNarrative current={wx.current} daily={wx.daily} hourly={wx.hourly}/>
                  {lastUpdated&&<div style={{textAlign:"center",fontFamily:"'DM Sans'",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2,letterSpacing:"0.05em"}}>{lastUpdated}</div>}
                  {/* Nav tabs below hero on iPad */}
                  <div style={{display:"flex",justifyContent:"center",padding:"16px 0 8px"}}>
                    <div style={{display:"flex",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(16px)",borderRadius:14,padding:3,border:"1px solid rgba(255,255,255,0.12)",gap:2}}>
                      {NAV.map(function(navItem){return(
                        <button key={navItem.id} onClick={()=>setTab(navItem.id)} style={{padding:"7px 16px",borderRadius:11,border:"none",background:tab===navItem.id?"rgba(255,255,255,0.18)":"transparent",color:tab===navItem.id?"#fff":"rgba(255,255,255,0.55)",fontFamily:"'DM Sans'",fontSize:12,fontWeight:tab===navItem.id?600:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                          <Icon name={navItem.icon} size={12}/>{navItem.label}
                        </button>
                      );})}
                    </div>
                  </div>
                  {/* Forecast card compact on iPad left col */}
                  {tab==="forecast"&&<div style={{marginTop:8}}><DailyForecast daily={wx.daily}/></div>}
                  {tab==="radar"&&<div style={{marginTop:8}}><RadarMap lat={activeLoc.lat} lon={activeLoc.lon}/></div>}
                </div>
              )}
            </div>

            {/* RIGHT COLUMN — today's content */}
            <div style={{flex:1,minWidth:0,paddingBottom:60,paddingTop:8}}>
              <AlertBanner alerts={alerts} onDismiss={dismissAlert}/>
              {tab==="today"&&wx&&!isLoading&&(
                <div style={{animation:"fadeIn 0.4s ease"}}>
                  <PlanningConfidenceCard hourly={wx.hourly}/>
                  <EnvironmentalTimeline hourly={wx.hourly} prefs={prefs}/>
                  <BestTimeCards hourly={wx.hourly} prefs={prefs}/>
                  <CommuteCard hourly={wx.hourly} prefs={prefs}/>
                  <ClothingCard wx={wx.current} prefs={prefs}/>
                  <InsightList current={wx.current} hourly={wx.hourly} sigs={signals} prefs={prefs}/>
                  <RawDetails wx={wx.current}/>
                </div>
              )}
            </div>
          </div>
        ):(
          /* ── PHONE LAYOUT ── */
          <div>
            {/* HERO */}
            <div style={{maxWidth:480,margin:"0 auto"}}>
              {isLoading&&<LoadingState/>}
              {error&&!isLoading&&<ErrorState message={error} onRetry={()=>{setErrorLoc(p=>Object.assign({},p,{[activeLocId]:null}));loadWeather(activeLoc);}}/>}
              {wx&&!isLoading&&(
                <div>
                  <WeatherHero wx={wx.current} loc={activeLoc} prefs={prefs}/>
                  <AtmosphereTag cond={wx.current.condition} hour={localHour} temp={wx.current.temp} wind={wx.current.wind}/>
                  <DailyNarrative current={wx.current} daily={wx.daily} hourly={wx.hourly}/>
                  {lastUpdated&&<div style={{textAlign:"center",fontFamily:"'DM Sans'",fontSize:10,color:"rgba(255,255,255,0.3)",marginTop:2,letterSpacing:"0.05em"}}>{lastUpdated}</div>}
                </div>
              )}
            </div>

            {/* NAV TABS */}
            <div style={{display:"flex",justifyContent:"center",padding:"12px 20px",maxWidth:480,margin:"0 auto"}}>
              <div style={{display:"flex",background:"rgba(0,0,0,0.3)",backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderRadius:14,padding:3,border:"1px solid rgba(255,255,255,0.12)",gap:2}}>
                {NAV.map(({id,label,icon})=>(
                  <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 15px",borderRadius:11,border:"none",background:tab===id?"rgba(255,255,255,0.18)":"transparent",color:tab===id?"#fff":"rgba(255,255,255,0.55)",fontFamily:"'DM Sans'",fontSize:12,fontWeight:tab===id?600:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5,transition:"all 0.2s"}}>
                    <Icon name={icon} size={12}/>{label}
                  </button>
                ))}
              </div>
            </div>

            {/* CONTENT */}
            <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 80px"}}>
              <AlertBanner alerts={alerts} onDismiss={dismissAlert}/>

              {tab==="today"&&wx&&!isLoading&&(
                <div style={{animation:"fadeIn 0.4s ease"}}>
                  <PlanningConfidenceCard hourly={wx.hourly}/>
                  <EnvironmentalTimeline hourly={wx.hourly} prefs={prefs}/>
                  <BestTimeCards hourly={wx.hourly} prefs={prefs}/>
                  <CommuteCard hourly={wx.hourly} prefs={prefs}/>
                  <ClothingCard wx={wx.current} prefs={prefs}/>
                  <InsightList current={wx.current} hourly={wx.hourly} sigs={signals} prefs={prefs}/>
                  <RawDetails wx={wx.current}/>
                </div>
              )}
              {tab==="forecast"&&wx&&!isLoading&&<DailyForecast daily={wx.daily}/>}
              {tab==="radar"&&activeLoc&&<div style={{animation:"fadeIn 0.4s ease"}}><RadarMap lat={activeLoc.lat} lon={activeLoc.lon}/></div>}
            </div>
          </div>
        )}
      </div>

      {/* GROUPS DRAWER */}
      {showGroups&&<GroupsDrawer groups={groups} locations={locations} wxCache={wxCache} loadingLoc={loadingLoc} onSelectCity={handleSelectGroupCity} onEditGroup={g=>setEditingGroup(g)} onNewGroup={()=>setEditingGroup({})} onMoveGroup={moveGroup} onClose={()=>setShowGroups(false)}/>}
      {editingGroup!==null&&<GroupEditModal group={editingGroup} locations={locations} onSave={handleSaveGroup} onDelete={handleDeleteGroup} onClose={()=>setEditingGroup(null)}/>}
      {showSettings&&<SettingsDrawer prefs={prefs} onSavePrefs={handleSavePrefs} onClose={()=>setShowSettings(false)} onFbSave={handleFbSave} onFbLoad={handleFbLoad} syncStatus={syncStatus}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
