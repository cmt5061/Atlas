    const { useState, useEffect, useRef, useCallback } = React;

    const SVGS = {

      Github:         '<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>',
      CloudOff:       '<path d="M1 1l22 22"/><path d="M9.17 4.17a7 7 0 0 1 9.17 9.17M9 13H3.64a4.5 4.5 0 0 1-.08-9 6 6 0 0 1 11.29 1.88M17.5 17.5A4.5 4.5 0 0 1 13 19H9"/>',
      Loader:         '<line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/>',

      ArrowDown:      '<line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>',
      ArrowDownToLine:'<line x1="12" y1="17" x2="12" y2="3"/><polyline points="17 12 12 17 7 12"/><line x1="5" y1="21" x2="19" y2="21"/>',
      ArrowUpFromLine:'<polyline points="17 11 12 6 7 11"/><line x1="12" y1="6" x2="12" y2="20"/><line x1="5" y1="3" x2="19" y2="3"/>',
      Layers:         '<polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>',
      Edit2:          '<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>',
      Clock:          '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      Crosshair:      '<circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/>',
    };
    function Icon({ name, size, style }) {
      return <svg width={size||14} height={size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round" style={style||{}} dangerouslySetInnerHTML={{ __html: SVGS[name]||"" }} />;
    }

    // ── ATLAS APP ICON ───────────────────────────────────────────
    function AtlasIcon({ size }) {
      const s = size || 34;
      return (
        <svg width={s} height={s} viewBox="0 0 40 40" style={{ borderRadius: Math.round(s*0.224), flexShrink:0, display:"block" }}>
          <defs>
            <linearGradient id="ibg" x1="0" y1="0" x2="0.6" y2="1">
              <stop offset="0%" stopColor="#1e3a8a"/>
              <stop offset="52%" stopColor="#0369a1"/>
              <stop offset="100%" stopColor="#f59e0b"/>
            </linearGradient>
          </defs>
          <rect width="40" height="40" rx="9" fill="url(#ibg)"/>
          <circle cx="29" cy="22" r="5.5" fill="#fde68a" opacity="0.95"/>
          <circle cx="29" cy="22" r="5.5" fill="#fbbf24" opacity="0.5"/>
          <ellipse cx="9.5" cy="14" rx="4.5" ry="2.8" fill="white" opacity="0.72"/>
          <ellipse cx="12.5" cy="12.8" rx="4" ry="3.2" fill="white" opacity="0.72"/>
          <ellipse cx="7" cy="15.2" rx="3" ry="2" fill="white" opacity="0.72"/>
          <path d="M0 27 Q10 21 20 25 Q30 29 40 23 L40 40 L0 40Z" fill="#0c2d5a" opacity="0.5"/>
          <path d="M0 33 Q12 27 24 31 Q34 35 40 29 L40 40 L0 40Z" fill="#071830" opacity="0.65"/>
          <path d="M20 6 L35 33 L5 33 Z M20 21 L28 33 L12 33 Z" fill="rgba(255,255,255,0.92)" fillRule="evenodd"/>
          <circle cx="29" cy="8" r="0.8" fill="white" opacity="0.6"/>
          <circle cx="33" cy="12" r="0.5" fill="white" opacity="0.4"/>
        </svg>
      );
    }

    // ── FONT / GLOBAL CSS ────────────────────────────────────────
    const FONT_STYLE =
      "@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap');" +
      "*{box-sizing:border-box;margin:0;padding:0;}" +
      "body{font-family:'DM Sans',sans-serif;}" +
      "::-webkit-scrollbar{display:none;}" +
      "select option{background:#0f172a;}" +
      "input,select{outline:none;}" +
      "@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}";

    // ── STORAGE ──────────────────────────────────────────────────
    const NS = "atlas4_";
    const store = {
      get: k => { try { const v=localStorage.getItem(NS+k); return v?JSON.parse(v):null; } catch { return null; } },
      set: (k,v) => { try { localStorage.setItem(NS+k,JSON.stringify(v)); } catch {} },
    };

    // ── WMO HELPERS ──────────────────────────────────────────────
    function wmoCondition(c) {
      if(c===0) return "clear"; if(c<=3) return "partly";
      if(c<=48) return "cloudy"; if(c<=67) return "rain";
      if(c<=77) return "snow"; if(c<=82) return "rain"; return "storm";
    }
    function wmoDesc(c) {
      if(c===0) return "Clear"; if(c===1) return "Mostly Clear";
      if(c===2) return "Partly Cloudy"; if(c===3) return "Overcast";
      if(c<=48) return "Foggy"; if(c<=55) return "Drizzle";
      if(c<=67) return "Rain"; if(c<=77) return "Snow";
      if(c<=82) return "Showers"; return "Thunderstorm";
    }
    function wmoEmoji(c) {
      if(c===0) return "☀️"; if(c<=2) return "⛅"; if(c===3) return "☁️";
      if(c<=48) return "🌫️"; if(c<=67) return "🌧️"; if(c<=77) return "❄️";
      if(c<=82) return "🌦️"; return "⛈️";
    }

    // ── BACKGROUND GRADIENT — temp + condition aware ─────────────
    function getBg(cond, h, temp) {
      const t = temp || 65;
      const night = h>=21 || h<6;
      const dawn  = h>=6  && h<9;
      const dusk  = h>=17 && h<20;

      if (night) {
        if (t<28) return "linear-gradient(160deg,#060a10 0%,#0a1020 100%)";
        if (t<45) return "linear-gradient(160deg,#080e1c 0%,#0d1828 100%)";
        if (t<68) return "linear-gradient(160deg,#0f172a 0%,#1e1b4b 60%,#0c0a09 100%)";
        return "linear-gradient(160deg,#130f24 0%,#1e1040 60%,#120808 100%)";
      }
      if (cond==="storm") return "linear-gradient(160deg,#14082a 0%,#0f0a20 50%,#080810 100%)";
      if (cond==="snow")  return "linear-gradient(160deg,#c7dff0 0%,#deeef9 60%,#eef6fd 100%)";
      if (cond==="rain") {
        if (t<45) return "linear-gradient(160deg,#0a1520 0%,#131f2a 50%,#0d1a22 100%)";
        if (t<65) return "linear-gradient(160deg,#1a2a3f 0%,#1e2d4a 50%,#1a2535 100%)";
        return "linear-gradient(160deg,#1e3a5f 0%,#1e2d5a 50%,#263238 100%)";
      }
      if (cond==="cloudy") {
        if (t<28) return "linear-gradient(160deg,#141820 0%,#1c2230 100%)";
        if (t<45) return "linear-gradient(160deg,#1a2230 0%,#252f3e 100%)";
        if (t<58) return "linear-gradient(160deg,#222e40 0%,#2e3c50 100%)";
        if (t<68) return "linear-gradient(160deg,#2d3d52 0%,#3c4f66 100%)";
        if (t<78) return "linear-gradient(160deg,#38434e 0%,#4a5568 100%)";
        if (t<90) return "linear-gradient(160deg,#3d3830 0%,#504840 100%)";
        return "linear-gradient(160deg,#3a2820 0%,#4a3830 100%)";
      }
      // clear / partly — dawn + dusk override
      if (dawn) return "linear-gradient(160deg,#7c2d12 0%,#c2410c 40%,#f59e0b 80%,#fbbf24 100%)";
      if (dusk) return "linear-gradient(160deg,#7f1d1d 0%,#b91c1c 30%,#c2410c 60%,#f97316 100%)";
      if (t<28) return "linear-gradient(160deg,#0c1829 0%,#162035 50%,#0a1220 100%)";
      if (t<45) return "linear-gradient(160deg,#0f2540 0%,#1a3555 50%,#0d1e33 100%)";
      if (t<58) return "linear-gradient(160deg,#0e3054 0%,#1a4a7a 50%,#0d2845 100%)";
      if (t<68) return "linear-gradient(160deg,#0284c7 0%,#0ea5e9 40%,#7dd3fc 100%)";
      if (t<78) return "linear-gradient(160deg,#0369a1 0%,#0284c7 40%,#f59e0b 100%)";
      if (t<90) return "linear-gradient(160deg,#92400e 0%,#d97706 40%,#fbbf24 100%)";
      return "linear-gradient(160deg,#881337 0%,#be123c 30%,#dc2626 60%,#f97316 100%)";
    }

    // ── TIMEZONE ─────────────────────────────────────────────────
    const USER_TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

    // ── GEOCODING ────────────────────────────────────────────────
    async function geocode(query) {
      const res = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(query) + "&count=6&language=en&format=json");
      const data = await res.json();
      return (data.results||[]).map(r => ({
        id: r.latitude.toFixed(2)+"_"+r.longitude.toFixed(2),
        name: r.name,
        region: [r.admin1, r.country_code].filter(Boolean).join(", "),
        lat: r.latitude, lon: r.longitude,
      }));
    }
    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch("https://nominatim.openstreetmap.org/reverse?lat="+lat+"&lon="+lon+"&format=json", { headers:{"Accept-Language":"en"} });
        const d = await res.json();
        const name = d.address.city||d.address.town||d.address.village||d.address.county||"My Location";
        const region = (d.address.state_code||d.address.country_code||"").toUpperCase();
        return { name, region };
      } catch { return { name:"My Location", region:"" }; }
    }

    // ── WEATHER SERVICE ──────────────────────────────────────────
    async function fetchWeather(lat, lon) {
      const tz = encodeURIComponent(USER_TZ);
      const url = "https://api.open-meteo.com/v1/forecast" +
        "?latitude="+lat+"&longitude="+lon +
        "&hourly=temperature_2m,apparent_temperature,precipitation_probability,weathercode,windspeed_10m,relativehumidity_2m,uv_index,visibility" +
        "&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,windspeed_10m_max,uv_index_max" +
        "&current_weather=true" +
        "&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch" +
        "&timezone="+tz+"&forecast_days=7";
      const res = await fetch(url);
      if (!res.ok) throw new Error("Weather API "+res.status);
      return transformWeather(await res.json());
    }

    function transformWeather(raw) {
      const cw=raw.current_weather, h=raw.hourly, d=raw.daily;
      // Use API's current_weather.time (already in location's local timezone)
      const cwHour = cw.time ? cw.time.slice(0,13) : "";
      let ci = cwHour ? h.time.findIndex(t => t.slice(0,13)===cwHour) : 0;
      if (ci<0) ci=0;

      const current = {
        temp:         Math.round(cw.temperature),
        feelsLike:    Math.round(h.apparent_temperature[ci]!=null ? h.apparent_temperature[ci] : cw.temperature),
        condition:    wmoCondition(cw.weathercode),
        description:  wmoDesc(cw.weathercode),
        wmoCode:      cw.weathercode,
        humidity:     h.relativehumidity_2m[ci]||0,
        wind:         Math.round(cw.windspeed),
        visibility:   Math.round((h.visibility[ci]||10000)/1609.34),
        uvIndex:      Math.round(h.uv_index[ci]||0),
        high:         Math.round(d.temperature_2m_max[0]),
        low:          Math.round(d.temperature_2m_min[0]),
        precipChance: h.precipitation_probability[ci]||0,
      };

      const hourlyOut = [];
      for (let i=0;i<24;i++) {
        const idx=ci+i;
        if (idx>=h.time.length) break;
        const hr = parseInt(h.time[idx].slice(11,13),10);
        hourlyOut.push({
          hour: hr,
          hourLabel: (hr%12||12)+(hr<12?"a":"p"),
          temp:         Math.round(h.temperature_2m[idx]),
          condition:    wmoCondition(h.weathercode[idx]),
          wmoCode:      h.weathercode[idx],
          precipChance: h.precipitation_probability[idx]||0,
          wind:         Math.round(h.windspeed_10m[idx]),
          humidity:     h.relativehumidity_2m[idx]||0,
        });
      }

      const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const dailyOut = d.time.map((t,i) => ({
        day:    i===0?"Today":DAYS[new Date(t+"T12:00:00").getDay()],
        high:   Math.round(d.temperature_2m_max[i]),
        low:    Math.round(d.temperature_2m_min[i]),
        condition: wmoCondition(d.weathercode[i]),
        wmoCode: d.weathercode[i],
        precip: d.precipitation_probability_max[i]||0,
        wind:   Math.round(d.windspeed_10m_max[i]),
        uvMax:  Math.round((d.uv_index_max||[])[i]||0),
      }));

      return { current, hourly:hourlyOut, daily:dailyOut, fetchedAt:Date.now() };
    }

    // ── GITHUB SERVICE ───────────────────────────────────────────
    const GH_FILE = "atlas-preferences.json";
    async function ghRead(token, repo) {
      const res = await fetch("https://api.github.com/repos/"+repo+"/contents/"+GH_FILE, { headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json"} });
      if (res.status===404) return null;
      if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.message||"GitHub "+res.status); }
      const data=await res.json();
      const content=JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g,"")))));
      return { content, sha:data.sha };
    }
    async function ghWrite(token, repo, content, sha) {
      const encoded=btoa(unescape(encodeURIComponent(JSON.stringify(content,null,2))));
      const body={message:"atlas: sync preferences",content:encoded};
      if (sha) body.sha=sha;
      const res=await fetch("https://api.github.com/repos/"+repo+"/contents/"+GH_FILE, { method:"PUT", headers:{Authorization:"Bearer "+token,Accept:"application/vnd.github+json","Content-Type":"application/json"}, body:JSON.stringify(body) });
      if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.message||"GitHub "+res.status); }
      return res.json();
    }

    // ── SIGNALS ──────────────────────────────────────────────────
    function processSignals(hourly) {
      const sigs=[];
      if (!hourly||!hourly.length) return sigs;
      let rs=null,re=null;
      for (let i=0;i<hourly.length;i++) {
        if (hourly[i].precipChance>=50) { if(rs===null)rs=i; re=i; }
      }
      if (rs!==null) {
        let mx=0; hourly.slice(rs,re+1).forEach(h=>{ if(h.precipChance>mx)mx=h.precipChance; });
        sigs.push({type:"rain_window",startIdx:rs,endIdx:re,start:hourly[rs].hourLabel,end:hourly[re].hourLabel,intensity:mx>80?"heavy":mx>60?"moderate":"light"});
      }
      let early=0,late=0;
      hourly.slice(0,6).forEach(h=>early+=h.temp); early/=6;
      hourly.slice(18,24).forEach(h=>late+=h.temp); late/=6;
      const delta=Math.round(late-early);
      if (Math.abs(delta)>=8) sigs.push({type:"temp_trend",direction:delta<0?"falling":"rising",delta:Math.abs(delta)});
      const cf=hourly.filter(h=>h.temp>=60&&h.temp<=78&&h.wind<15&&h.precipChance<30);
      if (cf.length>=2) sigs.push({type:"comfort_window",hours:cf.map(h=>h.hourLabel)});
      return sigs;
    }

    function generateInsights(wx, hourly, sigs) {
      const out=[];
      if (!wx||!hourly||!hourly.length) return out;
      const rain=sigs.find(s=>s.type==="rain_window");
      if (rain) {
        const pi=rain.startIdx+Math.floor((rain.endIdx-rain.startIdx)/2);
        out.push({id:"rain",icon:"🌧️",priority:10,
          title:rain.intensity.charAt(0).toUpperCase()+rain.intensity.slice(1)+" rain "+rain.start+"–"+rain.end,
          description:"Carry an umbrella. Rain peaks around "+(hourly[pi]?hourly[pi].hourLabel:rain.start)+"."});
      }
      const trend=sigs.find(s=>s.type==="temp_trend");
      if (trend) out.push({id:"trend",icon:trend.direction==="falling"?"📉":"📈",priority:8,
        title:"Temps "+trend.direction+" "+trend.delta+"° tonight",
        description:trend.direction==="falling"?"Sharp drop expected — bring a layer.":"Warmer evening ahead. Dress light."});
      const cf=sigs.find(s=>s.type==="comfort_window");
      if (cf&&cf.hours.length>=2) out.push({id:"comfort",icon:"✨",priority:7,
        title:"Best outside: "+cf.hours[0]+"–"+cf.hours[cf.hours.length-1],
        description:"Comfortable temps, light wind, dry skies — ideal for a walk or outdoor lunch."});
      if (wx.uvIndex>=6) out.push({id:"uv",icon:"☀️",priority:5,title:"UV index "+wx.uvIndex+" — apply sunscreen",description:"UV peaks midday. SPF 30+ recommended."});
      if (wx.humidity>=80) out.push({id:"humid",icon:"💧",priority:4,title:"High humidity today",description:"At "+wx.humidity+"% it'll feel muggy. Stay hydrated."});
      if (wx.wind>=25) out.push({id:"wind",icon:"💨",priority:6,title:"Gusty — "+wx.wind+" mph winds",description:"Strong winds may affect outdoor plans."});
      return out.sort((a,b)=>b.priority-a.priority).slice(0,4);
    }

    function generateAlerts(sigs, prefs, hourly) {
      const out=[];
      const rain=sigs.find(s=>s.type==="rain_window");
      if (rain&&hourly) {
        const ch=prefs.commuteHours||{};
        const ms=ch.morningStart!=null?ch.morningStart:7, me=ch.morningEnd!=null?ch.morningEnd:9;
        const es=ch.eveningStart!=null?ch.eveningStart:17, ee=ch.eveningEnd!=null?ch.eveningEnd:19;
        const rainHours=hourly.slice(rain.startIdx,rain.endIdx+1);
        if (rainHours.some(h=>h.hour>=ms&&h.hour<=me))
          out.push({id:"morning_rain",severity:"warning",title:"Rain during morning commute",message:"Rain between "+rain.start+"–"+rain.end+". Bring an umbrella."});
        else if (rainHours.some(h=>h.hour>=es&&h.hour<=ee))
          out.push({id:"evening_rain",severity:"warning",title:"Rain during evening commute",message:"Rain expected on your way home. Plan accordingly."});
      }
      const trend=sigs.find(s=>s.type==="temp_trend");
      if (trend&&trend.direction==="falling"&&trend.delta>=14)
        out.push({id:"rapid_drop",severity:"info",title:"Temperature drops "+trend.delta+"° tonight",message:"Sharp fall expected. Layer up before heading out."});
      return out;
    }

    // ── ACTIVITIES ───────────────────────────────────────────────
    const ACTIVITIES={
      run:{label:"Running",icon:"🏃",idealTemp:[50,68],maxWind:20,maxPrecip:20},
      walk:{label:"Walking",icon:"🚶",idealTemp:[55,80],maxWind:25,maxPrecip:30},
      bike:{label:"Cycling",icon:"🚴",idealTemp:[55,80],maxWind:15,maxPrecip:10},
      dine:{label:"Outdoor dining",icon:"🍽️",idealTemp:[60,82],maxWind:18,maxPrecip:10},
      golf:{label:"Golf",icon:"⛳",idealTemp:[58,82],maxWind:20,maxPrecip:15},
      travel:{label:"Travel",icon:"✈️",idealTemp:[40,95],maxWind:30,maxPrecip:80},
    };
    function scoreActivity(key,wx) {
      if (!wx) return {rating:"—",color:"rgba(255,255,255,0.3)"};
      const cfg=ACTIVITIES[key];
      const precip=wx.condition==="rain"?70:(wx.precipChance||0);
      let s=100;
      if(wx.temp<cfg.idealTemp[0]) s-=(cfg.idealTemp[0]-wx.temp)*3;
      if(wx.temp>cfg.idealTemp[1]) s-=(wx.temp-cfg.idealTemp[1])*3;
      if(wx.wind>cfg.maxWind) s-=(wx.wind-cfg.maxWind)*4;
      if(precip>cfg.maxPrecip) s-=(precip-cfg.maxPrecip)*1.5;
      const pct=Math.max(0,Math.min(100,s));
      return {score:pct,rating:pct>=70?"Good":pct>=40?"Okay":"Poor",color:pct>=70?"#4ade80":pct>=40?"#fbbf24":"#f87171"};
    }

    // ── COMMUTE HELPERS ──────────────────────────────────────────
    function formatHour(h) {
      if(h===0) return "12am"; if(h<12) return h+"am";
      if(h===12) return "12pm"; return (h-12)+"pm";
    }
    function getCommuteWeather(hourly, startH, endH) {
      if (!hourly||!hourly.length) return null;
      const win=hourly.filter(h=>h.hour>=startH&&h.hour<=endH);
      if (!win.length) return null;
      const avgTemp=Math.round(win.reduce((a,h)=>a+h.temp,0)/win.length);
      let maxPrecip=0, worstCode=0;
      win.forEach(h=>{ if(h.precipChance>maxPrecip)maxPrecip=h.precipChance; if(h.wmoCode>worstCode)worstCode=h.wmoCode; });
      return {avgTemp,maxPrecip,wmoCode:worstCode};
    }

    // ── TEMP CURVE ───────────────────────────────────────────────
    function TempCurve({data}) {
      if (!data||!data.length) return null;
      const temps=data.map(d=>d.temp);
      let mn=temps[0],mx=temps[0];
      temps.forEach(t=>{ if(t<mn)mn=t; if(t>mx)mx=t; });
      const r=mx-mn||1,W=700,H=50;
      const pts=temps.map((t,i)=>({x:(i/(temps.length-1))*W,y:H-10-((t-mn)/r)*(H-20)}));
      const d=pts.map((p,i)=>{
        if(i===0) return "M "+p.x+" "+p.y;
        const pv=pts[i-1],cx=(pv.x+p.x)/2;
        return "C "+cx+" "+pv.y+" "+cx+" "+p.y+" "+p.x+" "+p.y;
      }).join(" ");
      return (
        <svg viewBox={"0 0 "+W+" "+H} preserveAspectRatio="none" style={{width:"100%",height:36,display:"block"}}>
          <defs><linearGradient id="tcg" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stopColor="rgba(255,255,255,0.15)"/>
            <stop offset="50%" stopColor="rgba(255,255,255,0.7)"/>
            <stop offset="100%" stopColor="rgba(255,255,255,0.15)"/>
          </linearGradient></defs>
          <path d={d} fill="none" stroke="url(#tcg)" strokeWidth="2.5" strokeLinecap="round"/>
        </svg>
      );
    }

    // ── SETTINGS DRAWER ──────────────────────────────────────────
    function SettingsDrawer({prefs,onSavePrefs,onClose,onSyncPull,onSyncPush,syncStatus}) {
      const [localPrefs,setLocalPrefs]=useState(Object.assign({},prefs));
      const [ghToken,setGhToken]=useState(store.get("ghToken")||"");
      const [ghRepo,setGhRepo]=useState(store.get("ghRepo")||"");
      const [query,setQuery]=useState("");
      const [results,setResults]=useState([]);
      const [searching,setSearching]=useState(false);
      const [locations,setLocations]=useState(store.get("locations")||DEFAULT_LOCATIONS);
      const timer=useRef(null);

      const handleSearch=q=>{ setQuery(q); clearTimeout(timer.current); if(!q.trim()){setResults([]);return;} timer.current=setTimeout(async()=>{ setSearching(true); try{setResults(await geocode(q));}catch{setResults([]);} finally{setSearching(false);} },400); };
      const addLoc=loc=>{ const u=locations.find(l=>l.id===loc.id)?locations:locations.concat([loc]); setLocations(u);store.set("locations",u);setQuery("");setResults([]); };
      const removeLoc=id=>{ const u=locations.filter(l=>l.id!==id); if(!u.length)return; setLocations(u);store.set("locations",u); };
      const moveLoc=(i,dir)=>{
        const next=locations.slice(); const t=i+dir;
        if(t<0||t>=next.length)return;
        [next[i],next[t]]=[next[t],next[i]];
        setLocations(next);store.set("locations",next);
      };
      const setCH=(key,val)=>setLocalPrefs(p=>Object.assign({},p,{commuteHours:Object.assign({},p.commuteHours,{[key]:+val})}));
      const saveGh=()=>{ store.set("ghToken",ghToken.trim());store.set("ghRepo",ghRepo.trim()); };

        <div style={{position:"fixed",inset:0,zIndex:100,display:"flex",alignItems:"flex-end"}}>

          <div style={{position:"relative",width:"100%",maxWidth:480,margin:"0 auto",background:"rgba(13,20,38,0.97)",backdropFilter:"blur(24px)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:"22px 22px 0 0",padding:"24px 20px 40px",maxHeight:"88vh",overflowY:"auto"}}>

            </div>

            {/* Saved Cities */}
            <div style={{marginBottom:24}}>
              <FieldLabel>Saved Cities</FieldLabel>
              <div style={{position:"relative",marginBottom:8}}>
                <Icon name="Search" size={13} style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"rgba(255,255,255,0.35)"}}/>
                <input value={query} onChange={e=>handleSearch(e.target.value)} placeholder="Search cities…" style={{width:"100%",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"9px 12px 9px 32px",color:"#f1f5f9",fontFamily:"'DM Sans'",fontSize:13,outline:"none"}}/>
              </div>

                  {searching&&<div style={{padding:"10px 14px",fontFamily:"'DM Sans'",fontSize:12,color:"rgba(255,255,255,0.4)"}}>Searching…</div>}
                  {results.map(r=>(
                    <div key={r.id} onClick={()=>addLoc(r)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                      <div><div style={{fontFamily:"'DM Sans'",fontSize:13,color:"#f1f5f9"}}>{r.name}</div><div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.4)"}}>{r.region}</div></div>
                      <Icon name="Plus" size={14} style={{color:"rgba(255,255,255,0.4)"}}/>

                  <div key={label}>
                    <div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.45)",marginBottom:6}}>{label}</div>
                    <div style={{display:"flex",gap:5,alignItems:"center"}}>
                      <HrSelect value={ch[sk]!=null?ch[sk]:ds} onChange={e=>setCH(sk,e.target.value)}/>
                      <span style={{color:"rgba(255,255,255,0.3)",fontSize:11,flexShrink:0}}>–</span>
                      <HrSelect value={ch[ek]!=null?ch[ek]:de} onChange={e=>setCH(ek,e.target.value)}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Temp sensitivity */}
            <div style={{marginBottom:24}}>
              <FieldLabel>Temperature Sensitivity</FieldLabel>

                  return <button key={s} onClick={()=>setLocalPrefs(p=>Object.assign({},p,{temperatureSensitivity:s}))} style={{flex:1,padding:"8px 0",background:active?"rgba(255,255,255,0.18)":"rgba(255,255,255,0.07)",border:active?"1px solid rgba(255,255,255,0.25)":"1px solid rgba(255,255,255,0.08)",borderRadius:10,color:active?"#f1f5f9":"rgba(255,255,255,0.45)",fontFamily:"'DM Sans'",fontSize:13,cursor:"pointer",textTransform:"capitalize"}}>{s}</button>;
                })}

            <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:16,padding:16,marginBottom:20}}>

                <Icon name="Github" size={15} style={{color:"rgba(255,255,255,0.5)"}}/>
                <span style={{fontFamily:"'DM Sans'",fontWeight:600,fontSize:13,color:"rgba(255,255,255,0.7)"}}>GitHub Sync</span>

              <div style={{marginBottom:10}}><FieldLabel>Personal Access Token</FieldLabel><TInput type="password" value={ghToken} onChange={e=>setGhToken(e.target.value)} placeholder="ghp_xxxxxxxxxxxx"/><div style={{fontFamily:"'DM Sans'",fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:4}}>Needs <code>contents:write</code> scope</div></div>
              <div style={{marginBottom:14}}><FieldLabel>Repository (owner/repo)</FieldLabel><TInput value={ghRepo} onChange={e=>setGhRepo(e.target.value)} placeholder="your-username/my-weather-prefs"/></div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{saveGh();onSyncPull(ghToken.trim(),ghRepo.trim());}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px 0",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,color:"rgba(255,255,255,0.7)",fontFamily:"'DM Sans'",fontSize:13,cursor:"pointer"}}>
                  <Icon name="ArrowDownToLine" size={13}/> Pull
                </button>
                <button onClick={()=>{saveGh();onSyncPush(ghToken.trim(),ghRepo.trim());}} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px 0",background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,color:"rgba(255,255,255,0.7)",fontFamily:"'DM Sans'",fontSize:13,cursor:"pointer"}}>
                  <Icon name="ArrowUpFromLine" size={13}/> Push
                </button>

              {syncStatus&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:10}}>{statusIcon}<span style={{fontFamily:"'DM Sans'",fontSize:12,color:syncStatus==="success"?"#4ade80":syncStatus==="error"?"#f87171":"rgba(255,255,255,0.4)"}}>{syncStatus==="loading"?"Syncing…":syncStatus==="success"?"Synced successfully":syncStatus==="error"?"Sync failed — check token & repo":""}</span></div>}
            </div>

            <button onClick={handleSave} style={{width:"100%",padding:"13px 0",background:"rgba(255,255,255,0.12)",border:"1px solid rgba(255,255,255,0.18)",borderRadius:12,color:"#f1f5f9",fontFamily:"'DM Sans'",fontWeight:600,fontSize:14,cursor:"pointer"}}>
              Save &amp; Close
            </button>
          </div>
        </div>
      );
    }

    // ── APP ──────────────────────────────────────────────────────
    function App() {
      const [locations,setLocations]       = useState(store.get("locations")||DEFAULT_LOCATIONS);
      const [activeLocId,setActiveLocId]   = useState(store.get("locId")||DEFAULT_LOCATIONS[0].id);
      const [wxCache,setWxCache]           = useState({});
      const [loadingLoc,setLoadingLoc]     = useState({});
      const [errorLoc,setErrorLoc]         = useState({});
      const [prefs,setPrefs]               = useState(store.get("prefs")||DEFAULT_PREFS);
      const [selActs,setSelActs]           = useState(store.get("acts")||["run","walk"]);
      const [dismissed,setDismissed]       = useState(store.get("dismissed")||[]);
      const [tab,setTab]                   = useState("today");
      const [showSettings,setShowSettings] = useState(false);
      const [syncStatus,setSyncStatus]     = useState(null);
      const [ghSha,setGhSha]               = useState(store.get("ghSha")||null);
      const [groups,setGroups]             = useState(store.get("groups")||[]);
      const [editingGroup,setEditingGroup] = useState(null);
      const [locLoading,setLocLoading]     = useState(false);

      const STALE = 30*60*1000;
      const activeLoc = locations.find(l=>l.id===activeLocId)||locations[0];
      const wx        = wxCache[activeLocId];
      const isLoading = !!loadingLoc[activeLocId];
      const error     = errorLoc[activeLocId];
      const signals   = processSignals(wx?wx.hourly:null);
      const insights  = generateInsights(wx?wx.current:null, wx?wx.hourly:null, signals);
      const allAlerts = generateAlerts(signals, prefs, wx?wx.hourly:null);
      const alerts    = allAlerts.filter(a=>dismissed.indexOf(a.id)<0);
      const nowH      = new Date().getHours();
      const bg        = getBg(wx&&wx.current?wx.current.condition:"clear", nowH, wx&&wx.current?wx.current.temp:null);

      const loadWeather = useCallback(async loc => {
        const cached=wxCache[loc.id];
        if(cached&&Date.now()-cached.fetchedAt<STALE) return;
        setLoadingLoc(p=>Object.assign({},p,{[loc.id]:true}));
        setErrorLoc(p=>Object.assign({},p,{[loc.id]:null}));
        try {
          const data=await fetchWeather(loc.lat,loc.lon);
          setWxCache(p=>Object.assign({},p,{[loc.id]:data}));
        } catch(e) {
          setErrorLoc(p=>Object.assign({},p,{[loc.id]:e.message||"Failed to fetch weather"}));
        } finally {
          setLoadingLoc(p=>Object.assign({},p,{[loc.id]:false}));
        }
      }, [wxCache]);

      // Geolocation on mount
      useEffect(()=>{
        if (navigator.geolocation) {
          setLocLoading(true);
          navigator.geolocation.getCurrentPosition(
            async pos=>{
              const lat=pos.coords.latitude, lon=pos.coords.longitude;
              const { name, region }=await reverseGeocode(lat,lon);
              const myLoc={id:"my_location",name,region,lat:parseFloat(lat.toFixed(4)),lon:parseFloat(lon.toFixed(4)),isCurrentLocation:true};
              setLocations(prev=>{
                const filtered=prev.filter(l=>!l.isCurrentLocation);
                return [myLoc,...filtered];
              });
              // Only auto-switch if no saved preference
              if (!store.get("locId")) setActiveLocId("my_location");
              setLocLoading(false);
              loadWeather(myLoc);
            },
            ()=>setLocLoading(false),
            {timeout:8000}
          );
        }
      }, []);

      useEffect(()=>{ if(activeLoc) loadWeather(activeLoc); },[activeLocId]);
      useEffect(()=>{ if(tab==="groups") { groups.forEach(g=>g.locationIds.forEach(id=>{ const l=locations.find(x=>x.id===id); if(l) loadWeather(l); })); } },[tab]);
      useEffect(()=>{ store.set("locId",activeLocId); },[activeLocId]);
      useEffect(()=>{ store.set("prefs",prefs); },[prefs]);
      useEffect(()=>{ store.set("acts",selActs); },[selActs]);
      useEffect(()=>{ store.set("dismissed",dismissed); },[dismissed]);
      useEffect(()=>{ store.set("locations",locations); },[locations]);
      useEffect(()=>{ store.set("groups",groups); },[groups]);
      useEffect(()=>{ if("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(()=>{}); },[]);

      const handleSavePrefs=data=>{ const nl=data.locations; const rest=Object.assign({},data); delete rest.locations; setPrefs(rest); if(nl){setLocations(nl); if(!nl.find(l=>l.id===activeLocId))setActiveLocId(nl[0].id); nl.forEach(l=>loadWeather(l));} };
      const handleGhPull=async(token,repo)=>{ if(!token||!repo){setSyncStatus("error");return;} setSyncStatus("loading"); try{ const r=await ghRead(token,repo); if(!r){setSyncStatus("error");return;} if(r.content.locations){setLocations(r.content.locations);store.set("locations",r.content.locations);} if(r.content.prefs)setPrefs(r.content.prefs); if(r.content.selActs)setSelActs(r.content.selActs); if(r.content.groups){setGroups(r.content.groups);store.set("groups",r.content.groups);} setGhSha(r.sha);store.set("ghSha",r.sha);setSyncStatus("success"); }catch{setSyncStatus("error");} setTimeout(()=>setSyncStatus(null),3000); };
      const handleGhPush=async(token,repo)=>{ if(!token||!repo){setSyncStatus("error");return;} setSyncStatus("loading"); try{ const payload={version:PREFS_VERSION,locations,prefs,selActs,groups,pushedAt:new Date().toISOString()}; const r=await ghWrite(token,repo,payload,ghSha||undefined); const ns=(r&&r.content)?r.content.sha:ghSha; if(ns){setGhSha(ns);store.set("ghSha",ns);} setSyncStatus("success"); }catch{setSyncStatus("error");} setTimeout(()=>setSyncStatus(null),3000); };
      const handleSaveGroup=g=>{ setGroups(p=>{ const e=p.find(x=>x.id===g.id); const out=e?p.map(x=>x.id===g.id?g:x):[...p,g]; return out; }); g.locationIds.forEach(id=>{ const l=locations.find(x=>x.id===id); if(l)loadWeather(l); }); setEditingGroup(null); };
      const handleDeleteGroup=id=>{ setGroups(p=>p.filter(g=>g.id!==id)); setEditingGroup(null); };
      const handleSelectGroupCity=loc=>{ setLocations(p=>p.find(l=>l.id===loc.id)?p:[...p,loc]); setActiveLocId(loc.id); setTab("today"); };
      const moveGroup=(id,dir)=>{ setGroups(p=>{ const idx=p.findIndex(g=>g.id===id); const n=p.slice(); const t=idx+dir; if(t<0||t>=n.length)return p; [n[idx],n[t]]=[n[t],n[idx]]; return n; }); };
      const refreshLocation=()=>{ if(!navigator.geolocation)return; navigator.geolocation.getCurrentPosition(async pos=>{ const lat=pos.coords.latitude,lon=pos.coords.longitude; const {name,region}=await reverseGeocode(lat,lon); const myLoc={id:"my_location",name,region,lat:parseFloat(lat.toFixed(4)),lon:parseFloat(lon.toFixed(4)),isCurrentLocation:true}; setLocations(p=>[myLoc,...p.filter(l=>!l.isCurrentLocation)]); setWxCache(p=>{ const n=Object.assign({},p); delete n["my_location"]; return n; }); setActiveLocId("my_location"); loadWeather(myLoc); },()=>{},{timeout:8000}); };

      const toggleAct=k=>setSelActs(p=>p.indexOf(k)>=0?p.filter(x=>x!==k):[...p,k]);
      const dismissAlert=id=>setDismissed(p=>[...p,id]);
      const lastUpdated=wx?"Updated "+Math.round((Date.now()-wx.fetchedAt)/60000)+"m ago":"";
      const NAV=[{id:"today",label:"Today",icon:"Sun"},{id:"forecast",label:"Forecast",icon:"Calendar"},{id:"groups",label:"Groups",icon:"Layers"}];

      return (
        <div style={{minHeight:"100vh",background:bg,transition:"background 1.5s ease",fontFamily:"'DM Sans',sans-serif",overflowX:"hidden"}}>
          <style>{FONT_STYLE}</style>

          {/* ── HEADER ─────────────────────────────────────────── */}
          <div className="safe-top">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 18px 14px",maxWidth:480,margin:"0 auto"}}>
              {/* Logo + wordmark */}
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <AtlasIcon size={36}/>
                <span style={{fontFamily:"'Fraunces',serif",fontSize:22,fontWeight:400,color:"rgba(255,255,255,0.95)",letterSpacing:"0.04em"}}>ATLAS</span>
              </div>
              {/* Actions */}
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <IconBtn onClick={refreshLocation} style={{color:locLoading?"#38bdf8":"rgba(255,255,255,0.55)"}}>
                  <Icon name="Crosshair" size={14}/>
                </IconBtn>
                {wx&&tab!=="groups"&&(
                  <IconBtn onClick={()=>{ const n=Object.assign({},wxCache); delete n[activeLocId]; setWxCache(n); loadWeather(activeLoc); }}>
                    <Icon name="RefreshCw" size={13}/>
                  </IconBtn>
                )}
                {alerts.length>0&&(
                  <div style={{width:32,height:32,borderRadius:10,background:"rgba(251,191,36,0.2)",border:"1px solid rgba(251,191,36,0.3)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <Icon name="Bell" size={14} style={{color:"#fbbf24"}}/>
                  </div>
                )}
                <IconBtn onClick={()=>setShowSettings(true)} style={{color:"rgba(255,255,255,0.7)"}}>
                  <Icon name="Settings" size={14}/>
                </IconBtn>
              </div>
            </div>
          </div>

          {/* ── LOCATION PILLS ─────────────────────────────────── */}
          {tab!=="groups"&&(
            <div style={{display:"flex",gap:8,padding:"0 18px 0",maxWidth:480,margin:"0 auto",overflowX:"auto"}}>
              {locations.map(l=>(
                <Pill key={l.id} active={activeLocId===l.id} onClick={()=>setActiveLocId(l.id)}>
                  {l.isCurrentLocation?"📍 ":""}{l.name}
                </Pill>
              ))}
            </div>
          )}

          {/* ── WEATHER HERO ───────────────────────────────────── */}
          {tab!=="groups"&&(
            <div style={{maxWidth:480,margin:"0 auto"}}>
              {isLoading&&<LoadingState/>}
              {error&&!isLoading&&<ErrorState message={error} onRetry={()=>{ setErrorLoc(p=>Object.assign({},p,{[activeLocId]:null}));loadWeather(activeLoc); }}/>}
              {wx&&!isLoading&&(
                <div>
                  <WeatherHero wx={wx.current} loc={activeLoc}/>
                  {lastUpdated&&<div style={{textAlign:"center",fontFamily:"'DM Sans'",fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:4,letterSpacing:"0.05em"}}>{lastUpdated}</div>}
                </div>
              )}
            </div>
          )}

          {/* ── GROUPS HEADER ──────────────────────────────────── */}
          {tab==="groups"&&(
            <div style={{padding:"16px 20px 0",maxWidth:480,margin:"0 auto"}}>
              <div style={{fontFamily:"'Fraunces',serif",fontSize:28,fontWeight:300,color:"rgba(255,255,255,0.9)",letterSpacing:"-1px",marginBottom:4}}>My Groups</div>
              <div style={{fontFamily:"'DM Sans'",fontSize:13,color:"rgba(255,255,255,0.4)",marginBottom:16}}>Trips, home bases &amp; collections</div>
            </div>
          )}

          {/* ── NAV TABS ───────────────────────────────────────── */}
          <div style={{display:"flex",justifyContent:"center",padding:"12px 20px",maxWidth:480,margin:"0 auto"}}>
            <div style={{display:"flex",background:"rgba(255,255,255,0.08)",backdropFilter:"blur(12px)",borderRadius:14,padding:3,border:"1px solid rgba(255,255,255,0.1)",gap:2}}>
              {NAV.map(({id,label,icon})=>(
                <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 15px",borderRadius:11,border:"none",background:tab===id?"rgba(255,255,255,0.15)":"transparent",color:tab===id?"#fff":"rgba(255,255,255,0.5)",fontFamily:"'DM Sans'",fontSize:12,fontWeight:tab===id?600:400,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  <Icon name={icon} size={12}/>{label}
                </button>
              ))}
            </div>
          </div>

          {/* ── CONTENT ────────────────────────────────────────── */}
          <div style={{maxWidth:480,margin:"0 auto",padding:"0 16px 80px"}}>
            {tab!=="groups"&&<AlertBanner alerts={alerts} onDismiss={dismissAlert}/>}

            {tab==="today"&&wx&&!isLoading&&(
              <div>
                <HourlyScroller hourly={wx.hourly}/>
                <CommuteCard hourly={wx.hourly} prefs={prefs}/>
                <InsightList insights={insights}/>
                <ActivityPanel wx={wx.current} selActs={selActs} onToggle={toggleAct}/>
              </div>
            )}
            {tab==="forecast"&&wx&&!isLoading&&<DailyForecast daily={wx.daily}/>}
            {tab==="groups"&&(
              <GroupsView groups={groups} locations={locations} wxCache={wxCache} loadingLoc={loadingLoc}
                onSelectCity={handleSelectGroupCity} onEditGroup={g=>setEditingGroup(g)}
                onNewGroup={()=>setEditingGroup({})} onMoveGroup={moveGroup}/>
            )}
          </div>

          {/* ── MODALS ─────────────────────────────────────────── */}
          {showSettings&&(
            <SettingsDrawer prefs={prefs} onSavePrefs={handleSavePrefs} onClose={()=>setShowSettings(false)}
              onSyncPull={handleGhPull} onSyncPush={handleGhPush} syncStatus={syncStatus}/>
          )}
          {editingGroup!==null&&(
            <GroupEditModal group={editingGroup} locations={locations} onSave={handleSaveGroup}
              onDelete={handleDeleteGroup} onClose={()=>setEditingGroup(null)}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
